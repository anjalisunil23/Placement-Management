<!doctype html><html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Analytics · PlaceHub</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="css/style.css" rel="stylesheet"/></head>
<body data-page="analytics.html"><div class="app">
<aside class="sidebar" id="sidebar"></aside><div class="main"><header class="topbar" id="topbar"></header><main class="page">

<div class="page-header">
  <div><h1 class="page-title">Analytics Dashboard</h1><p class="page-sub">Deep insights across drives, branches and packages.</p></div>
  <select class="form-select w-auto"><option>FY 2025–26</option><option>FY 2024–25</option></select>
</div>

<div class="row g-3">
  <div class="col-lg-8"><div class="card-surface p-3 p-md-4"><h6 class="fw-bold">Hiring trend (12 months)</h6><div style="height:320px"><canvas id="c1"></canvas></div></div></div>
  <div class="col-lg-4"><div class="card-surface p-3 p-md-4"><h6 class="fw-bold">Branch share</h6><div style="height:320px"><canvas id="c2"></canvas></div></div></div>
  <div class="col-lg-6"><div class="card-surface p-3 p-md-4"><h6 class="fw-bold">Package bands</h6><div style="height:280px"><canvas id="c3"></canvas></div></div></div>
  <div class="col-lg-6"><div class="card-surface p-3 p-md-4"><h6 class="fw-bold">Job type split</h6><div style="height:280px"><canvas id="c4"></canvas></div></div></div>
  <div class="col-12"><div class="card-surface p-3 p-md-4"><h6 class="fw-bold">Offers by top companies</h6><div style="height:300px"><canvas id="c5"></canvas></div></div></div>
</div>

</main></div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script src="js/app.js"></script><script src="js/charts.js"></script>
<script>
const m=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
Charts.line(document.getElementById("c1"),m,[
  {label:"2025-26 Offers",data:[42,58,71,90,120,165,210,245,210,180,150,130]},
  {label:"2024-25 Offers",data:[38,50,65,80,108,140,180,220,190,160,135,115]},
]);
Charts.doughnut(document.getElementById("c2"),["CSE","ECE","ME","EE","CE","IT"],[820,540,310,260,180,420]);
Charts.bar(document.getElementById("c3"),["3-6","6-10","10-20","20-40","40+"],[820,640,320,140,28],"LPA");
Charts.pie(document.getElementById("c4"),["Full-time","Internship","Intern+PPO"],[1640,620,280]);
Charts.bar(document.getElementById("c5"),["TCS","Infosys","Wipro","Deloitte","Amazon","Google","Microsoft","Adobe","Flipkart","Goldman"],[210,180,160,95,42,28,35,52,68,24],"Offers");
</script></body></html>
