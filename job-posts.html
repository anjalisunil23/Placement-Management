<!doctype html><html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Job Posts · AJCE Placements</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="css/style.css?v=20260713p" rel="stylesheet"/>
<script src="js/ph-role-guard.js?v=20260714name"></script></head>
<body data-page="job-posts.html"><div class="app">
<aside class="sidebar" id="sidebar"></aside><div class="main"><header class="topbar" id="topbar"></header><main class="page">

<div class="page-header">
  <div><h1 class="page-title">Job Posts</h1><p class="page-sub" id="jobFeedSub">Company and alumni opportunities.</p></div>
</div>

<div class="card-surface">
  <div class="p-3 p-md-4 d-flex flex-wrap gap-2 align-items-center justify-content-between border-bottom" style="border-color:var(--border)!important">
    <div><h6 class="fw-bold mb-0">Available posts <span class="badge-soft muted ms-1" id="jobFeedCount">0</span></h6></div>
    <select class="form-select form-select-sm w-auto" id="sourceFilter">
      <option value="">All sources</option>
      <option value="company">Company posts</option>
      <option value="alumni">Alumni posts</option>
    </select>
  </div>
  <div class="p-3 p-md-4" id="jobFeedRows">
    <div class="text-muted-2 text-center p-4">Loading job posts…</div>
  </div>
</div>

</main></div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js?v=20260716fast"></script>
<script src="js/app.js?v=20260716fast"></script>
<script>
const feedRole = Auth.role();
let jobFeedRows = [];

function feedEscape(value) {
  return String(value ?? '').replace(/[&<>"']/g, ch => ({
    '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'
  })[ch]);
}

function feedEndpoint() {
  return {
    admin: '/admin/jobs',
    placement_officer: '/officer/jobs',
    staff: '/staff/jobs',
    student: '/student/jobs',
    alumni: '/alumni/jobs',
  }[feedRole] || '';
}

function renderJobFeed() {
  const source = document.getElementById('sourceFilter').value;
  const rows = source ? jobFeedRows.filter(row => row.sourceType === source) : jobFeedRows;
  document.getElementById('jobFeedCount').textContent = rows.length;
  document.getElementById('jobFeedRows').innerHTML = rows.length ? `<div class="row g-3">${rows.map(row => {
    const branches = Array.isArray(row.branches) && row.branches.length ? row.branches.join(', ') : 'All departments';
    const eligibility = row.eligibility || {};
    const eligibilityLabel = [
      Number(eligibility.minCgpa || 0) > 0 ? `CGPA ${eligibility.minCgpa}+` : '',
      eligibility.maxBacklogs != null ? `Backlogs ≤ ${eligibility.maxBacklogs}` : '',
    ].filter(Boolean).join(' · ') || 'No additional academic criteria';
    const status = String(row.status || 'open');
    const statusCls = ['open','ongoing'].includes(status) ? 'success' : (status === 'reviewing' ? 'warning' : 'muted');
    const posterUrl = row.posterUrl || row.imageUrl || '';
    const posterType = row.posterType || (row.imageUrl ? 'image' : '');
    return `<div class="col-md-6 col-xl-4"><article class="card-surface h-100 p-3">
      ${posterType === 'image' && posterUrl ? `<img src="${feedEscape(posterUrl)}" alt="${feedEscape(row.title)} job poster" class="w-100 rounded-3 mb-3" style="height:180px;object-fit:cover" loading="lazy"/>` : ''}
      <div class="d-flex justify-content-between gap-2 mb-2">
        <span class="badge-soft ${row.sourceType === 'company' ? 'info' : 'muted'}">${feedEscape(row.sourceLabel)}</span>
        <span class="badge-soft ${statusCls}">${feedEscape(status)}</span>
      </div>
      <h6 class="fw-bold mb-1">${feedEscape(row.title)}</h6>
      <div class="small text-muted-2 mb-3">${feedEscape(row.companyName)}</div>
      <div class="small d-grid gap-1">
        <div><i class="bi bi-briefcase me-2"></i>${feedEscape(row.jobType || '—')}</div>
        <div><i class="bi bi-cash-coin me-2"></i>${feedEscape(row.package || '—')}</div>
        <div><i class="bi bi-geo-alt me-2"></i>${feedEscape(row.location || '—')}</div>
        <div><i class="bi bi-diagram-3 me-2"></i>${feedEscape(branches)}</div>
        <div><i class="bi bi-mortarboard me-2"></i>${feedEscape(eligibilityLabel)}</div>
      </div>
      ${row.description ? `<p class="small text-muted-2 mt-3 mb-0">${feedEscape(row.description)}</p>` : ''}
      ${posterType === 'pdf' && posterUrl ? `<a class="btn btn-sm btn-outline-primary mt-3" href="${feedEscape(posterUrl)}" target="_blank" rel="noopener"><i class="bi bi-file-earmark-pdf me-1"></i>View job poster</a>` : ''}
      <div class="small text-muted-2 mt-3">Posted ${feedEscape(formatDate(row.createdAt))}</div>
    </article></div>`;
  }).join('')}</div>` : '<div class="text-muted-2 text-center p-4">No related job posts available.</div>';
}

async function loadJobFeed() {
  const endpoint = feedEndpoint();
  if (!endpoint || !Auth.hasRealAuth()) {
    jobFeedRows = [];
    renderJobFeed();
    return;
  }
  const res = await api(endpoint, { noRedirectOn401: true });
  if (!res?.success) {
    jobFeedRows = [];
    renderJobFeed();
    toast(res?.message || 'Could not load job posts.', 'error');
    return;
  }
  jobFeedRows = Array.isArray(res.data) ? res.data : [];
  renderJobFeed();
}

document.getElementById('sourceFilter').addEventListener('change', renderJobFeed);
onAppReady(loadJobFeed);
</script></body></html>
