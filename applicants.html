<!doctype html><html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Applicants · AJCE Placements</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="css/style.css?v=20260713p" rel="stylesheet"/></head>
<body data-page="applicants.html"><div class="app">
<aside class="sidebar" id="sidebar"></aside><div class="main"><header class="topbar" id="topbar"></header><main class="page">

<div class="page-header">
  <div><h1 class="page-title">Applicant Management</h1></div>
  <div class="d-flex gap-2">
    <button type="button" class="btn btn-outline-secondary" id="exportBtn"><i class="bi bi-download me-1"></i>Export</button>
  </div>
</div>

<div class="row g-3">
  <div class="col-lg-3">
    <div class="card-surface p-3 mb-3">
      <h6 class="fw-bold mb-3">Filters</h6>
      <div class="mb-3"><label class="form-label small fw-semibold">Min CGPA</label><input type="range" class="form-range" id="cgpaRange" min="5" max="10" step="0.1" value="7.5"/><div class="small text-muted-2">≥ <span id="cgpaVal">7.5</span></div></div>
      <div class="mb-3"><label class="form-label small fw-semibold">Branch</label>
        <select class="form-select form-select-sm" id="branchFilter"><option value="">All branches</option></select>
      </div>
      <div class="mb-3"><label class="form-label small fw-semibold">Status</label>
        <select class="form-select form-select-sm" id="statusFilter">
          <option value="">All</option>
          <option value="applied">Applied</option>
          <option value="under_review">Waiting</option>
          <option value="shortlisted">Shortlisted</option>
          <option value="offered">Offered</option>
          <option value="rejected">Rejected</option>
        </select>
      </div>
      <button type="button" class="btn btn-outline-secondary w-100 btn-sm" id="resetFilters">Reset</button>
    </div>
    <div class="card-surface p-3">
      <h6 class="fw-bold mb-2">Quick stats</h6>
      <div id="quickStats"></div>
    </div>
  </div>
  <div class="col-lg-9">
    <div class="card-surface">
      <div class="p-3 d-flex gap-2 align-items-center">
        <div class="search-with-icon flex-grow-1"><i class="bi bi-search"></i><input class="form-control" id="searchInput" placeholder="Search applicants…"/></div>
      </div>
      <div class="table-wrap"><table class="table-modern"><thead><tr><th>Sl. No</th><th>Candidate</th><th>Roll</th><th>Branch</th><th>CGPA</th><th>Status</th><th>Resume</th><th></th></tr></thead><tbody id="ar"></tbody></table></div>
    </div>
  </div>
</div>

</main></div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js?v=20260721exportcsv"></script>
<script src="js/app.js?v=20260721exportcsv"></script>
<script>
const user = Auth.user() || demoUserFor('company');
const co = user.companyName || 'Acme Cloud';
let applicantRows = [];
let useApi = false;

function populateBranchFilter(rows) {
  const select = document.getElementById('branchFilter');
  const selected = select.value;
  const branches = [...new Set(rows.map(r => String(r.dept || '').trim()).filter(Boolean))]
    .sort((a, b) => a.localeCompare(b));
  select.innerHTML = '<option value="">All branches</option>' + branches
    .map(branch => `<option value="${branch}">${branch}</option>`)
    .join('');
  if (branches.includes(selected)) select.value = selected;
}

function normalizeApplicant(a) {
  if (a.student) {
    return {
      id: String(a._id || a.id),
      name: a.student.name,
      roll: a.student.registerNumber,
      dept: a.student.department,
      cgpa: a.student.cgpa,
      status: a.uiStatus || a.status,
      rawStatus: a.status,
      companyViewStatus: a.companyViewStatus || '',
      hasResume: a.student.hasResume,
    };
  }
  return { ...a, id: a.id || ('demo-' + a.roll), rawStatus: a.status, companyViewStatus: a.companyViewStatus || '' };
}

function renderQuickStats(rows) {
  const counts = { applied: 0, shortlisted: 0, interview: 0, offered: 0 };
  rows.forEach(r => {
    const s = r.status;
    if (s === 'shortlisted') counts.shortlisted++;
    else if (s === 'offered') counts.offered++;
    else if (s === 'interview') counts.interview++;
    else counts.applied++;
  });
  document.getElementById('quickStats').innerHTML = `
    <div class="d-flex justify-content-between mb-1 small"><span>Applied</span><strong>${counts.applied}</strong></div>
    <div class="d-flex justify-content-between mb-1 small"><span>Shortlisted</span><strong>${counts.shortlisted}</strong></div>
    <div class="d-flex justify-content-between mb-1 small"><span>Interviewed</span><strong>${counts.interview}</strong></div>
    <div class="d-flex justify-content-between small"><span>Offered</span><strong class="text-success">${counts.offered}</strong></div>`;
}

function filteredRows() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  return applicantRows.filter(r => {
    if (q && !`${r.name} ${r.roll} ${r.dept}`.toLowerCase().includes(q)) return false;
    return true;
  });
}

function applicantActionButtons(row) {
  return `<div class="btn-group btn-group-sm">
    <button type="button" class="btn btn-outline-warning" data-action="waiting" data-id="${row.id}">Waiting</button>
    <button type="button" class="btn btn-outline-success" data-action="select" data-id="${row.id}">Select</button>
    <button type="button" class="btn btn-outline-danger" data-action="reject" data-id="${row.id}">Reject</button>
  </div>`;
}

function renderTable() {
  const rows = filteredRows();
  renderQuickStats(applicantRows);
  document.getElementById('ar').innerHTML = rows.length ? rows.map((r, i) => `
    <tr>
      <td>${i + 1}</td>
      <td><div class="d-flex align-items-center gap-2"><div class="avatar" style="width:32px;height:32px;font-size:.72rem">${(r.name||'?').split(' ').map(n=>n[0]).join('').slice(0,2)}</div><strong>${r.name}</strong></div></td>
      <td>${r.roll || '—'}</td><td>${r.dept || '—'}</td><td>${r.cgpa ?? '—'}</td>
      <td>${appStatusBadge(r.status)}</td>
      <td>${r.hasResume !== false ? '<i class="bi bi-file-earmark-pdf-fill text-danger"></i>' : '<span class="text-muted-2">—</span>'}</td>
      <td>${applicantActionButtons(r)}</td>
    </tr>`).join('') : '<tr><td colspan="8" class="text-muted-2 p-4">No applicants yet.</td></tr>';
}

async function loadApplicants() {
  const minCgpa = document.getElementById('cgpaRange').value;
  const branch = document.getElementById('branchFilter').value;
  const status = document.getElementById('statusFilter').value;
  useApi = Auth.hasRealAuth();
  if (useApi) {
    const qs = new URLSearchParams();
    if (minCgpa) qs.set('minCgpa', minCgpa);
    if (branch) qs.set('branch', branch);
    if (status) qs.set('status', status);
    const res = await api(`/company/applications?${qs}`, { noRedirectOn401: true });
    if (res?.success) {
      applicantRows = (res.data || []).map(normalizeApplicant);
      populateBranchFilter(applicantRows);
      renderTable();
      return;
    }
    applicantRows = [];
    populateBranchFilter(applicantRows);
    renderTable();
    toast(res?.message || 'Could not load live applicants. Please refresh and try again.', 'error');
    return;
  }
  applicantRows = companyApplicants(co).map(normalizeApplicant);
  const min = parseFloat(minCgpa);
  applicantRows = applicantRows.filter(r => !min || (r.cgpa >= min));
  if (branch) applicantRows = applicantRows.filter(r => r.dept === branch);
  renderTable();
}

async function appAction(id, action) {
  if (!useApi) { toast(`${action} recorded (demo).`, 'success'); return; }
  let path = 'result';
  let body;
  if (action === 'waiting') {
    path = 'review';
  } else if (action === 'select') {
    body = { status: 'selected' };
  } else if (action === 'reject') {
    body = { status: 'rejected' };
  } else {
    toast('Unknown action.', 'error');
    return;
  }
  const res = await api(`/company/applications/${encodeURIComponent(id)}/${path}`, { method: 'POST', body, noRedirectOn401: true });
  if (res?.success) { toast(res.message || 'Updated.', 'success'); await loadApplicants(); }
  else toast(res?.message || 'Action failed.', 'error');
}

document.getElementById('ar').addEventListener('click', e => {
  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  appAction(btn.dataset.id, btn.dataset.action);
});

document.getElementById('cgpaRange').addEventListener('input', e => {
  document.getElementById('cgpaVal').textContent = e.target.value;
});
document.getElementById('cgpaRange').addEventListener('change', loadApplicants);
document.getElementById('branchFilter').addEventListener('change', loadApplicants);
document.getElementById('statusFilter').addEventListener('change', loadApplicants);
document.getElementById('searchInput').addEventListener('input', renderTable);
document.getElementById('resetFilters').addEventListener('click', () => {
  document.getElementById('cgpaRange').value = 7.5;
  document.getElementById('cgpaVal').textContent = '7.5';
  document.getElementById('branchFilter').value = '';
  document.getElementById('statusFilter').value = '';
  loadApplicants();
});

document.getElementById('exportBtn').addEventListener('click', async () => {
  if (!useApi && !Auth.hasRealAuth()) {
    toast('Sign in to export candidate results.', 'warn');
    return;
  }
  const btn = document.getElementById('exportBtn');
  const prev = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>Exporting…';
  try {
    const qs = new URLSearchParams();
    const minCgpa = document.getElementById('cgpaRange').value;
    const branch = document.getElementById('branchFilter').value;
    const status = document.getElementById('statusFilter').value;
    if (minCgpa) qs.set('minCgpa', minCgpa);
    if (branch) qs.set('branch', branch);
    if (status) qs.set('status', status);

    const headers = { Accept: 'text/csv,*/*' };
    const token = Auth.token();
    if (token && token !== 'session' && !String(token).startsWith('demo-token')) {
      headers.Authorization = `Bearer ${token}`;
    }
    const res = await fetch(`${API_BASE}/company/applications/export?${qs}`, {
      method: 'GET',
      headers,
      credentials: 'include',
      cache: 'no-store',
    });
    const buffer = await res.arrayBuffer();
    const bytes = new Uint8Array(buffer);
    if (!res.ok) {
      let message = `Export failed (${res.status}).`;
      try {
        const json = JSON.parse(new TextDecoder().decode(bytes));
        if (json?.message) message = json.message;
      } catch { /* not JSON */ }
      throw new Error(message);
    }
    const type = String(res.headers.get('content-type') || '').toLowerCase();
    if (type.includes('json')) {
      const json = JSON.parse(new TextDecoder().decode(bytes));
      throw new Error(json?.message || 'Export failed.');
    }
    const disposition = res.headers.get('content-disposition') || '';
    const match = /filename="?([^"]+)"?/i.exec(disposition);
    const filename = match?.[1] || `${String(co || 'company').replace(/[^\w.\-]+/g, '_')}-candidate-results.csv`;
    const blob = new Blob([buffer], { type: type || 'text/csv;charset=utf-8' });
    const objectUrl = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = objectUrl;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(objectUrl);
    toast('Candidate results downloaded.', 'success');
  } catch (err) {
    toast(err?.message || 'Could not export candidate results.', 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = prev;
  }
});
onAppReady(() => loadApplicants());
</script></body></html>
