<!doctype html><html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Applicants · PlaceHub</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="css/style.css" rel="stylesheet"/></head>
<body data-page="applicants.html"><div class="app">
<aside class="sidebar" id="sidebar"></aside><div class="main"><header class="topbar" id="topbar"></header><main class="page">

<div class="page-header">
  <div><h1 class="page-title">Applicant Management</h1><p class="page-sub">Google · SDE-1 · 412 applicants</p></div>
  <div class="d-flex gap-2"><button class="btn btn-outline-secondary"><i class="bi bi-download me-1"></i>Export</button><button class="btn btn-primary"><i class="bi bi-check2-square me-1"></i>Shortlist selected</button></div>
</div>

<div class="row g-3">
  <div class="col-lg-3">
    <div class="card-surface p-3 mb-3">
      <h6 class="fw-bold mb-3">Filters</h6>
      <div class="mb-3"><label class="form-label small fw-semibold">CGPA range</label><input type="range" class="form-range" min="5" max="10" step="0.1" value="7.5"/><div class="small text-muted-2">≥ 7.5</div></div>
      <div class="mb-3"><label class="form-label small fw-semibold">Branch</label>
        <div class="form-check"><input class="form-check-input" type="checkbox" checked id="b1"><label for="b1" class="small">CSE (218)</label></div>
        <div class="form-check"><input class="form-check-input" type="checkbox" checked id="b2"><label for="b2" class="small">IT (124)</label></div>
        <div class="form-check"><input class="form-check-input" type="checkbox" id="b3"><label for="b3" class="small">ECE (70)</label></div>
      </div>
      <div class="mb-3"><label class="form-label small fw-semibold">Status</label>
        <select class="form-select form-select-sm"><option>All</option><option>Applied</option><option>Shortlisted</option><option>Interview</option><option>Offered</option><option>Rejected</option></select>
      </div>
      <button class="btn btn-outline-secondary w-100 btn-sm">Reset</button>
    </div>
    <div class="card-surface p-3">
      <h6 class="fw-bold mb-2">Quick stats</h6>
      <div class="d-flex justify-content-between mb-1 small"><span>Applied</span><strong>412</strong></div>
      <div class="d-flex justify-content-between mb-1 small"><span>Shortlisted</span><strong>148</strong></div>
      <div class="d-flex justify-content-between mb-1 small"><span>Interviewed</span><strong>62</strong></div>
      <div class="d-flex justify-content-between small"><span>Offered</span><strong class="text-success">14</strong></div>
    </div>
  </div>
  <div class="col-lg-9">
    <div class="card-surface">
      <div class="p-3 d-flex gap-2 align-items-center">
        <div class="position-relative flex-grow-1"><i class="bi bi-search position-absolute" style="left:.8rem;top:50%;transform:translateY(-50%);color:var(--muted)"></i><input class="form-control ps-4" placeholder="Search applicants…"/></div>
        <select class="form-select w-auto"><option>Sort: CGPA ↓</option><option>Name</option><option>Applied date</option></select>
      </div>
      <div class="table-wrap"><table class="table-modern"><thead><tr><th><input type="checkbox"/></th><th>Candidate</th><th>Roll</th><th>Branch</th><th>CGPA</th><th>Status</th><th>Resume</th><th></th></tr></thead><tbody id="ar"></tbody></table></div>
    </div>
  </div>
</div>

</main></div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script>
const user = Auth.user() || demoUserFor('company');
const co = user.companyName || 'Acme Cloud';
const apps = companyApplicants(co);
document.querySelector('.page-sub').textContent = `${co} · ${apps.length} applicants across your open roles`;
document.getElementById('ar').innerHTML = apps.length ? apps.map(a => `<tr>
 <td><input type="checkbox"/></td>
 <td><div class="d-flex align-items-center gap-2"><div class="avatar" style="width:32px;height:32px;font-size:.72rem">${a.name.split(' ').map(n=>n[0]).join('')}</div><strong>${a.name}</strong></div></td>
 <td>${a.roll || '—'}</td><td>${a.dept}</td><td>${a.cgpa}</td>
 <td>${appStatusBadge(a.status)}</td>
 <td><i class="bi bi-file-earmark-pdf-fill text-danger"></i></td>
 <td><button class="btn btn-sm btn-outline-primary" onclick="toast('Profile view (demo).','info')">View</button></td>
</tr>`).join('') : '<tr><td colspan="8" class="text-muted-2 p-4">No applicants yet.</td></tr>';
</script></body></html>
