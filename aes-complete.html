<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>AJCE Placements</title>
<script src="js/api.js?v=20260723direct"></script>
<script>
(async () => {
  // Legacy entry — AES login now redirects straight to the dashboard.
  // Keep this page as a silent bridge for old bookmarks / cached redirects.
  Auth.clear();
  Auth._sessionReady = false;
  try { sessionStorage.removeItem('ph_auth_boot_at'); } catch (_) {}
  try { localStorage.setItem('ph-token', 'session'); } catch (_) {}
  const params = new URLSearchParams(location.search);
  const next = params.get('next') || '';
  let ok = false;
  for (let i = 0; i < 2; i++) {
    if (await Auth.bootstrap({ soft: false, fast: true })) {
      ok = true;
      break;
    }
    if (i < 1) await new Promise((r) => setTimeout(r, 40));
  }
  if (!ok) {
    window.location.replace('/public-stats.html?aes_error=' + encodeURIComponent('Could not start your session. Please try again.'));
    return;
  }
  try { sessionStorage.setItem('ph_auth_boot_at', String(Date.now())); } catch (_) {}
  const target = Auth.resolveRedirect(next);
  window.location.replace(target.startsWith('/') ? target : '/' + target);
})();
</script>
</head>
<body data-page="aes-complete.html"></body>
</html>
