<!doctype html><html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Company Portal · PlaceHub</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="css/style.css" rel="stylesheet"/></head>
<body data-page="company.html"><div class="app">
<aside class="sidebar" id="sidebar"></aside><div class="main"><header class="topbar" id="topbar"></header><main class="page">

<div class="page-header">
  <div><h1 class="page-title">Company Portal</h1><p class="page-sub" id="portalSub">Post jobs, review applicants, upload results.</p></div>
  <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#postJob"><i class="bi bi-plus-lg me-1"></i>Post a Job</button>
</div>

<div class="row g-3 mb-3">
  <div class="col-6 col-md-3"><div class="card-surface stat-card"><div class="lbl">Job postings</div><div class="val" id="statTotalJobs">0</div><div class="small text-muted-2" id="statActiveMeta">0 active</div></div></div>
  <div class="col-6 col-md-3"><div class="card-surface stat-card"><div class="lbl">Applicants</div><div class="val" id="statApplicants">0</div></div></div>
  <div class="col-6 col-md-3"><div class="card-surface stat-card"><div class="lbl">Shortlisted</div><div class="val" id="statShortlisted">0</div></div></div>
  <div class="col-6 col-md-3"><div class="card-surface stat-card"><div class="lbl">Offered</div><div class="val" id="statOffered">0</div></div></div>
</div>

<div class="row g-3">
  <div class="col-lg-7">
    <div class="card-surface">
      <div class="p-3 p-md-4 d-flex justify-content-between"><h6 class="fw-bold mb-0">Your job postings <span class="badge-soft muted ms-1" id="jobCountBadge">0</span></h6><a href="applicants.html" class="btn btn-sm btn-outline-primary">View applicants</a></div>
      <div class="table-wrap"><table class="table-modern"><thead><tr><th>Role</th><th>Type</th><th>Applicants</th><th>Status</th><th></th></tr></thead>
      <tbody id="jobRows"></tbody></table></div>
    </div>
  </div>
  <div class="col-lg-5">
    <div class="card-surface p-4 mb-3">
      <h6 class="fw-bold mb-3">Upload offer results</h6>
      <div class="dropzone"><i class="bi bi-file-earmark-arrow-up display-6 d-block mb-1"></i>Drop CSV of selected candidates</div>
      <button type="button" class="btn btn-primary w-100 mt-3" id="uploadResultsBtn">Upload results</button>
    </div>
    <div class="card-surface p-4">
      <h6 class="fw-bold mb-3">Recruitment funnel</h6>
      <div style="height:240px"><canvas id="funnel"></canvas></div>
    </div>
  </div>
</div>

<div class="modal fade" id="postJob" tabindex="-1"><div class="modal-dialog modal-lg modal-dialog-centered"><div class="modal-content">
  <div class="modal-header"><h5 class="modal-title fw-bold">Post a new job</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
  <form id="postJobForm">
    <div class="modal-body row g-3">
      <div class="col-md-6"><label class="form-label small fw-semibold">Role</label><input class="form-control" name="title" required/></div>
      <div class="col-md-3"><label class="form-label small fw-semibold">Type</label><select class="form-select" name="jobType"><option>Full-time</option><option>Internship</option></select></div>
      <div class="col-md-3"><label class="form-label small fw-semibold">CTC (LPA)</label><input class="form-control" name="package" required/></div>
      <div class="col-md-6"><label class="form-label small fw-semibold">Location</label><input class="form-control" name="location" required/></div>
      <div class="col-md-6"><label class="form-label small fw-semibold">Openings</label><input class="form-control" name="openings" type="number" min="0"/></div>
      <div class="col-12"><label class="form-label small fw-semibold">JD</label><textarea class="form-control" name="description" rows="5"></textarea></div>
    </div>
    <div class="modal-footer"><button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button><button type="submit" class="btn btn-primary">Post job</button></div>
  </form>
</div></div></div>

</main></div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script src="js/api.js"></script>
<script src="js/app.js"></script><script src="js/charts.js"></script>
<script>
const user = Auth.user() || demoUserFor('company');
const co = user.companyName || 'Acme Cloud';
document.getElementById('portalSub').textContent = `${co} — manage your job postings and recruitment pipeline`;

let jobRows = [];
let funnelChart = null;

function normalizeJob(j) {
  const st = mapCompanyJobStatus(j.status);
  return {
    id: String(j._id || j.id || ''),
    title: j.title || '',
    jobType: j.jobType || j.type || 'Full-time',
    package: j.package || '',
    location: j.location || '',
    applicantCount: j.applicantCount ?? 0,
    createdAt: j.createdAt,
    status: j.status || 'open',
    statusLabel: st.statusLabel,
    statusCls: st.statusCls,
  };
}

function countActiveJobs(rows) {
  return rows.filter(j => ['open', 'ongoing', 'reviewing'].includes(String(j.status || '').toLowerCase())).length;
}

function statsFromJobs(rows) {
  const applicantTotal = rows.reduce((sum, j) => sum + (Number(j.applicantCount) || 0), 0);
  return {
    totalJobs: rows.length,
    activeJobs: countActiveJobs(rows),
    totalApplicants: applicantTotal,
    shortlisted: 0,
    offered: 0,
    funnel: { applied: applicantTotal, shortlisted: 0, interview: 0, offered: 0, joined: 0 },
  };
}

function renderStats(dash) {
  const totalJobs = dash?.totalJobs ?? jobRows.length;
  const activeJobs = dash?.activeJobs ?? countActiveJobs(jobRows);
  document.getElementById('statTotalJobs').textContent = totalJobs;
  document.getElementById('statActiveMeta').textContent = `${activeJobs} active`;
  document.getElementById('statApplicants').textContent = dash?.totalApplicants ?? jobRows.reduce((s, j) => s + (Number(j.applicantCount) || 0), 0);
  document.getElementById('statShortlisted').textContent = dash?.shortlisted ?? 0;
  document.getElementById('statOffered').textContent = dash?.offered ?? 0;
  document.getElementById('jobCountBadge').textContent = String(totalJobs);
  const f = dash?.funnel || { applied: 0, shortlisted: 0, interview: 0, offered: 0, joined: 0 };
  if (funnelChart) funnelChart.destroy();
  funnelChart = Charts.bar(document.getElementById('funnel'), ['Applied','Shortlisted','Interview','Offered','Joined'], [f.applied, f.shortlisted, f.interview, f.offered, f.joined], 'Candidates');
}

function renderJobs() {
  document.getElementById('jobRows').innerHTML = jobRows.length ? jobRows.map(j => `
    <tr>
      <td><strong>${j.title}</strong><div class="small text-muted-2">${j.location || '—'} · ${formatDate(j.createdAt)}</div></td>
      <td>${j.jobType}</td>
      <td>${j.applicantCount}</td>
      <td><span class="badge-soft ${j.statusCls}">${j.statusLabel}</span></td>
      <td><a href="applicants.html" class="btn btn-sm btn-outline-primary">Applicants</a></td>
    </tr>`).join('') : '<tr><td colspan="5" class="text-muted-2 p-4">No job postings yet.</td></tr>';
}

async function loadPortal() {
  if (Auth.hasRealAuth()) {
    const [dashRes, jobsRes] = await Promise.all([
      api('/company/dashboard', { noRedirectOn401: true }),
      api('/company/jobs', { noRedirectOn401: true }),
    ]);
    if (jobsRes?.success) {
      jobRows = (jobsRes.data || []).map(normalizeJob);
    }
    if (jobsRes?.success || dashRes?.success) {
      const stats = dashRes?.success ? { ...statsFromJobs(jobRows), ...dashRes.data } : statsFromJobs(jobRows);
      renderStats(stats);
      renderJobs();
      return;
    }
  }
  jobRows = [
    { title:'SDE-1', jobType:'Full-time', applicantCount:412, location:'Bengaluru', status:'open', statusLabel:'Open', statusCls:'success', createdAt: new Date().toISOString() },
    { title:'SDE Intern', jobType:'Internship', applicantCount:680, location:'Remote', status:'ongoing', statusLabel:'Ongoing', statusCls:'info', createdAt: new Date().toISOString() },
    { title:'Product Analyst', jobType:'Full-time', applicantCount:192, location:'Bengaluru', status:'reviewing', statusLabel:'Reviewing', statusCls:'warning', createdAt: new Date().toISOString() },
  ];
  renderStats(statsFromJobs(jobRows));
  renderJobs();
}

onAppReady(() => { loadPortal(); });

document.getElementById('postJobForm').addEventListener('submit', async e => {
  e.preventDefault();
  const data = Object.fromEntries(new FormData(e.target).entries());
  if (Auth.hasRealAuth()) {
    const res = await api('/company/jobs', { method: 'POST', body: data, noRedirectOn401: true });
    if (res?.success) {
      toast('Job posted successfully.', 'success');
      bootstrap.Modal.getInstance(document.getElementById('postJob')).hide();
      e.target.reset();
      await loadPortal();
      return;
    }
    toast(res?.message || 'Could not post job.', 'error');
    return;
  }
  toast('Job posted successfully.', 'success');
  bootstrap.Modal.getInstance(document.getElementById('postJob')).hide();
  e.target.reset();
});

document.getElementById('uploadResultsBtn').addEventListener('click', () => toast('Bulk CSV upload will be available in a future release.', 'info'));
</script>
</body></html>
