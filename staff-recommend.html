<!doctype html><html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Recommend Company · PlaceHub</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="css/style.css" rel="stylesheet"/></head>
<body data-page="staff-recommend.html"><div class="app">
<aside class="sidebar" id="sidebar"></aside><div class="main"><header class="topbar" id="topbar"></header><main class="page">

<div class="page-header">
  <div><h1 class="page-title">Recommend a Company</h1><p class="page-sub">Refer a recruiter to the placement cell. Submissions are reviewed only by the administrator.</p></div>
</div>

<div class="row g-3">
  <div class="col-lg-5">
    <div class="card-surface p-4">
      <h5 class="fw-bold mb-3">Company details</h5>
      <form id="recommendForm" class="row g-3">
        <div class="col-12"><label class="form-label small fw-semibold">Company name</label><input class="form-control" name="companyName" required placeholder="e.g. Razorpay"/></div>
        <div class="col-12"><label class="form-label small fw-semibold">Company website (optional)</label><input class="form-control" name="companyWebsite" placeholder="https://company.com/careers"/></div>
        <div class="col-12"><label class="form-label small fw-semibold">HR name</label><input class="form-control" name="hrName" required placeholder="e.g. Priya Menon"/></div>
        <div class="col-md-6"><label class="form-label small fw-semibold">HR email</label><input class="form-control" type="email" name="hrEmail" required placeholder="hr@company.com"/></div>
        <div class="col-md-6"><label class="form-label small fw-semibold">Contact number</label><input class="form-control" name="contactNumber" required placeholder="+91 98765 43210"/></div>
        <div class="col-12"><button type="submit" class="btn btn-primary w-100"><i class="bi bi-send me-1"></i>Submit Recommendation</button></div>
      </form>
      <div class="alert alert-info small mt-3 mb-0">Only the admin can view HR contact details and follow up with the company.</div>
    </div>
  </div>
  <div class="col-lg-7">
    <div class="card-surface">
      <div class="p-3 p-md-4"><h6 class="fw-bold mb-0">Your recommendations</h6><small class="text-muted-2">Track status of companies you have referred.</small></div>
      <div class="table-wrap">
        <table class="table-modern"><thead><tr><th>Company</th><th>Submitted</th><th>Status</th></tr></thead>
        <tbody id="myRecs"></tbody></table>
      </div>
    </div>
  </div>
</div>

</main></div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/staff-api.js"></script>
<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script>
function renderMine() {
  const rows = StaffRecs.mine();
  document.getElementById('myRecs').innerHTML = rows.length ? rows.map(r => `
    <tr><td><strong>${r.companyName}</strong></td><td>${formatDate(r.submittedAt)}</td><td>${recStatusBadge(r.status)}</td></tr>`).join('')
    : '<tr><td colspan="3" class="text-muted-2 p-4">No recommendations yet. Submit your first company above.</td></tr>';
}
(async () => {
  if (Auth.role() === 'staff' && Auth.hasRealAuth()) {
    await Auth.ensureSession();
    await StaffRecs.fetch();
  }
  renderMine();
})();
document.getElementById('recommendForm').addEventListener('submit', async e => {
  e.preventDefault();
  const data = Object.fromEntries(new FormData(e.target).entries());
  const res = await StaffRecs.add(data);
  if (!res) {
    toast('Could not save recommendation. Sign in as staff and ensure your profile exists in the database.', 'error');
    return;
  }
  toast('Company recommended. The admin will review and contact them.', 'success');
  e.target.reset();
  renderMine();
});
</script>
</body></html>
