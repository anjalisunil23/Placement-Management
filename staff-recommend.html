<!doctype html><html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Recommend Company · AJCE Placements</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="css/style.css?v=20260713p" rel="stylesheet"/></head>
<body data-page="staff-recommend.html"><div class="app">
<aside class="sidebar" id="sidebar"></aside><div class="main"><header class="topbar" id="topbar"></header><main class="page">

<div class="page-header">
  <div>
    <h1 class="page-title">Recommend a Company</h1>
    <p class="page-sub">Refer a recruiter to the placement cell. Submissions are reviewed only by the administrator.</p>
  </div>
  <div class="d-flex gap-2">
    <button type="button" class="btn btn-primary" onclick="ReferralModals.openStaff()"><i class="bi bi-plus-lg me-1"></i>Recommend Company</button>
  </div>
</div>

<div class="card-surface">
  <div class="p-3 p-md-4">
    <h6 class="fw-bold mb-0">Your recommendations</h6>
    <small class="text-muted-2">Track status of companies you have referred.</small>
  </div>
  <div class="table-wrap">
    <table class="table-modern">
      <thead><tr><th>Company</th><th>Submitted</th><th>Status</th></tr></thead>
      <tbody id="myRecs"></tbody>
    </table>
  </div>
</div>

</main></div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/staff-api.js?v=20260713p"></script>
<script src="js/api.js?v=20260713p"></script>
<script src="js/app.js?v=20260713p"></script>
<script>
async function renderMine() {
  await StaffRecs.fetch();
  const rows = StaffRecs.mine();
  document.getElementById('myRecs').innerHTML = rows.length ? rows.map(r => `
    <tr><td><strong>${r.companyName}</strong></td><td>${formatDate(r.submittedAt)}</td><td>${recStatusBadge(r.status)}</td></tr>`).join('')
    : '<tr><td colspan="3" class="text-muted-2 p-4">No recommendations yet. <button type="button" class="btn btn-link btn-sm p-0 align-baseline" onclick="ReferralModals.openStaff()">Submit your first company</button></td></tr>';
}
onAppReady(() => renderMine());
document.addEventListener('ph-staff-recommend-added', () => renderMine());
</script>
</body></html>
