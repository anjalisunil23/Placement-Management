<!doctype html><html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Recommend Company · AJCE Placements</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="css/style.css?v=20260714h" rel="stylesheet"/>
<style>
  .rec-card-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(min(100%,20.5rem),1fr));
    gap:1rem;
  }
  .rec-card{
    display:flex;
    flex-direction:column;
    gap:.9rem;
    padding:1.15rem 1.2rem;
    border:1px solid var(--border);
    border-radius:14px;
    background:var(--surface,#fff);
    min-height:100%;
  }
  .rec-card-top{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:.75rem;
  }
  .rec-card-company{
    display:flex;
    align-items:flex-start;
    gap:.7rem;
    min-width:0;
  }
  .rec-card-avatar{
    width:2.5rem;height:2.5rem;min-width:2.5rem;
    border-radius:10px;
    display:inline-flex;align-items:center;justify-content:center;
    background:color-mix(in srgb,var(--primary) 12%,transparent);
    color:var(--primary);
    font-weight:700;
  }
  .rec-card-company strong{
    display:block;
    line-height:1.25;
    word-break:break-word;
  }
  .rec-card-website{
    font-size:.82rem;
    word-break:break-all;
  }
  .rec-card-fields{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:.65rem .85rem;
  }
  .rec-card-fields .full{grid-column:1 / -1}
  .rec-card-fields .lbl{
    display:block;
    font-size:.72rem;
    font-weight:600;
    color:var(--muted);
    text-transform:uppercase;
    letter-spacing:.03em;
    margin-bottom:.1rem;
  }
  .rec-card-fields .val{
    font-size:.9rem;
    font-weight:500;
    word-break:break-word;
  }
  @media (max-width:420px){
    .rec-card-fields{grid-template-columns:1fr}
  }
</style>
</head>
<body data-page="staff-recommend.html"><div class="app">
<aside class="sidebar" id="sidebar"></aside><div class="main"><header class="topbar" id="topbar"></header><main class="page">

<div class="page-header">
  <div>
    <h1 class="page-title">Recommend a Company</h1>
  </div>
  <div class="d-flex gap-2">
    <button type="button" class="btn btn-primary" onclick="ReferralModals.openStaff()"><i class="bi bi-plus-lg me-1"></i>Recommend Company</button>
  </div>
</div>

<div id="myRecs" class="rec-card-grid"></div>

</main></div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/staff-api.js?v=20260714h"></script>
<script src="js/api.js?v=20260723perf"></script>
<script src="js/app.js?v=20260716notifflat"></script>
<script>
function escHtml(s) {
  return String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/"/g, '&quot;');
}

function companyInitials(name) {
  const parts = String(name || '').trim().split(/\s+/).filter(Boolean);
  if (!parts.length) return 'C';
  if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
  return (parts[0][0] + parts[1][0]).toUpperCase();
}

function formatWebsite(url) {
  const raw = String(url || '').trim();
  if (!raw) return '';
  const href = /^https?:\/\//i.test(raw) ? raw : `https://${raw}`;
  return `<a class="rec-card-website" href="${escHtml(href)}" target="_blank" rel="noopener">${escHtml(raw)}</a>`;
}

function fieldHtml(label, value, full = false) {
  const v = String(value ?? '').trim();
  return `<div class="${full ? 'full' : ''}">
    <span class="lbl">${escHtml(label)}</span>
    <span class="val">${v ? escHtml(v) : '—'}</span>
  </div>`;
}

function recommendationCard(r) {
  const website = formatWebsite(r.companyWebsite);
  const comments = String(r.adminComments || '').trim();
  const reason = String(r.reason || '').trim();
  return `<article class="rec-card card-surface border-0">
    <div class="rec-card-top">
      <div class="rec-card-company">
        <span class="rec-card-avatar">${escHtml(companyInitials(r.companyName))}</span>
        <div class="min-w-0">
          <strong>${escHtml(r.companyName || 'Company')}</strong>
          ${website || '<span class="small text-muted-2">No website</span>'}
        </div>
      </div>
      ${typeof recStatusBadge === 'function' ? recStatusBadge(r.status) : escHtml(r.status || 'pending')}
    </div>
    <div class="rec-card-fields">
      ${fieldHtml('Contact person', r.hrName)}
      ${fieldHtml('Role in company', r.contactRole)}
      ${fieldHtml('Contact email', r.hrEmail)}
      ${fieldHtml('Contact number', r.contactNumber)}
      ${fieldHtml('Submitted', r.submittedAt ? formatDate(r.submittedAt) : '')}
      ${fieldHtml('Status', r.status || 'pending')}
      ${reason ? fieldHtml('Notes', reason, true) : ''}
      ${comments ? fieldHtml('Admin comments', comments, true) : ''}
    </div>
  </article>`;
}

async function renderMine() {
  await StaffRecs.fetch();
  // Live staff API already returns only this user's recommendations.
  const rows = (Auth.hasRealAuth() && !Auth.isDemo())
    ? StaffRecs.all()
    : StaffRecs.mine();
  const root = document.getElementById('myRecs');
  if (!rows.length) {
    root.className = '';
    root.innerHTML = `<div class="card-surface p-4 text-center text-muted-2">
      No recommendations yet.
      <button type="button" class="btn btn-link btn-sm p-0 align-baseline" onclick="ReferralModals.openStaff()">Submit your first company</button>
    </div>`;
    return;
  }
  root.className = 'rec-card-grid';
  root.innerHTML = rows.map(recommendationCard).join('');
}
onAppReady(() => renderMine());
document.addEventListener('ph-staff-recommend-added', () => renderMine());
</script>
</body></html>
