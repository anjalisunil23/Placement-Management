<!doctype html><html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Placement Tracking · PlaceHub</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="css/style.css" rel="stylesheet"/></head>
<body data-page="tracking.html"><div class="app">
<aside class="sidebar" id="sidebar"></aside><div class="main"><header class="topbar" id="topbar"></header><main class="page">

<div class="page-header"><div><h1 class="page-title">Placement Tracking</h1><p class="page-sub">Track every candidate's journey across stages.</p></div></div>

<div class="row g-3 mb-3">
  <div class="col-6 col-md-2"><div class="card-surface stat-card"><div class="lbl">Applied</div><div class="val"><span class="counter" data-target="4280">0</span></div></div></div>
  <div class="col-6 col-md-2"><div class="card-surface stat-card"><div class="lbl">Shortlisted</div><div class="val"><span class="counter" data-target="1820">0</span></div></div></div>
  <div class="col-6 col-md-2"><div class="card-surface stat-card"><div class="lbl">Interviewed</div><div class="val"><span class="counter" data-target="980">0</span></div></div></div>
  <div class="col-6 col-md-2"><div class="card-surface stat-card"><div class="lbl">Offered</div><div class="val"><span class="counter" data-target="312">0</span></div></div></div>
  <div class="col-6 col-md-2"><div class="card-surface stat-card"><div class="lbl">Joined</div><div class="val"><span class="counter" data-target="248">0</span></div></div></div>
  <div class="col-6 col-md-2"><div class="card-surface stat-card"><div class="lbl">Conversion</div><div class="val"><span class="counter" data-target="58" data-suffix="%">0</span></div></div></div>
</div>

<div class="row g-3">
  <div class="col-lg-7"><div class="card-surface p-3 p-md-4">
    <h6 class="fw-bold mb-3">Placement funnel</h6>
    <div style="height:320px"><canvas id="trackBar"></canvas></div>
  </div></div>
  <div class="col-lg-5"><div class="card-surface p-3 p-md-4">
    <h6 class="fw-bold mb-3">Offer status</h6>
    <div style="height:320px"><canvas id="trackPie"></canvas></div>
  </div></div>
</div>

<div class="card-surface mt-3">
  <div class="p-3 p-md-4 d-flex justify-content-between"><h6 class="fw-bold mb-0">Candidate progress</h6><button class="btn btn-sm btn-outline-primary">Export</button></div>
  <div class="table-wrap"><table class="table-modern"><thead><tr><th>Student</th><th>Company</th><th>Role</th><th>Stage</th><th>Updated</th><th>Status</th></tr></thead><tbody id="tr"></tbody></table></div>
</div>

</main></div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script src="js/app.js"></script><script src="js/charts.js"></script>
<script>
Charts.bar(document.getElementById("trackBar"),["Applied","Shortlisted","Test","Interview","Offered","Joined"],[4280,1820,1240,980,312,248],"Candidates");
Charts.doughnut(document.getElementById("trackPie"),["Single Offer","Multiple Offers","No Offer Yet"],[182,66,2814]);
const t=[
 ["Aarav Mehta","Google","SDE-1","Final Interview","2h ago","info"],
 ["Rahul Verma","Microsoft","SWE","Offer Released","1d ago","success"],
 ["Kabir Singh","Amazon","SDE Intern","Joined","3d ago","success"],
 ["Sneha Iyer","Deloitte","Analyst","Shortlisted","5h ago","info"],
 ["Priya Nair","Adobe","PM Intern","Rejected","2d ago","danger"],
];
document.getElementById("tr").innerHTML=t.map(x=>`<tr><td><strong>${x[0]}</strong></td><td>${x[1]}</td><td>${x[2]}</td><td>${x[3]}</td><td>${x[4]}</td><td><span class="badge-soft ${x[5]}">${x[3]}</span></td></tr>`).join("");
</script></body></html>
