<!doctype html><html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Placement Tracking · AJCE Placements</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="css/style.css?v=20260713p" rel="stylesheet"/></head>
<body data-page="tracking.html"><div class="app">
<aside class="sidebar" id="sidebar"></aside><div class="main"><header class="topbar" id="topbar"></header><main class="page">

<div class="page-header"><div><h1 class="page-title">Placement Tracking</h1><p class="page-sub">Track every candidate's journey across stages.</p></div></div>

<div id="trackingAlert" class="alert alert-info d-flex align-items-center gap-2 d-none"></div>

<div class="row g-3 mb-3" id="trackingStats">
  <div class="col-6 col-md-2"><div class="card-surface stat-card"><div class="lbl">Applied</div><div class="val"><span class="counter" id="sApplied" data-target="0">0</span></div></div></div>
  <div class="col-6 col-md-2"><div class="card-surface stat-card"><div class="lbl">Shortlisted</div><div class="val"><span class="counter" id="sShortlisted" data-target="0">0</span></div></div></div>
  <div class="col-6 col-md-2"><div class="card-surface stat-card"><div class="lbl">Interviewed</div><div class="val"><span class="counter" id="sInterviewed" data-target="0">0</span></div></div></div>
  <div class="col-6 col-md-2"><div class="card-surface stat-card"><div class="lbl">Offered</div><div class="val"><span class="counter" id="sOffered" data-target="0">0</span></div></div></div>
  <div class="col-6 col-md-2"><div class="card-surface stat-card"><div class="lbl">Joined</div><div class="val"><span class="counter" id="sJoined" data-target="0">0</span></div></div></div>
  <div class="col-6 col-md-2"><div class="card-surface stat-card"><div class="lbl">Conversion</div><div class="val"><span class="counter" id="sConversion" data-target="0" data-decimals="1" data-suffix="%">0</span></div></div></div>
</div>

<div class="row g-3">
  <div class="col-lg-7"><div class="card-surface p-3 p-md-4">
    <h6 class="fw-bold mb-3">Placement funnel</h6>
    <div style="height:320px"><canvas id="trackBar"></canvas></div>
  </div></div>
  <div class="col-lg-5"><div class="card-surface p-3 p-md-4">
    <h6 class="fw-bold mb-3">Offer status</h6>
    <div style="height:320px"><canvas id="trackPie"></canvas></div>
  </div></div>
</div>

<div class="card-surface mt-3">
  <div class="p-3 p-md-4 d-flex justify-content-between"><h6 class="fw-bold mb-0">Candidate progress</h6><button class="btn btn-sm btn-outline-primary" id="exportBtn" type="button">Export</button></div>
  <div class="table-wrap"><table class="table-modern"><thead><tr><th>Student</th><th>Company</th><th>Role</th><th>Stage</th><th>Updated</th><th>Status</th></tr></thead><tbody id="tr"></tbody></table></div>
</div>

</main></div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script src="js/api.js?v=20260723perf"></script>
<script src="js/app.js?v=20260716notifflat"></script><script src="js/charts.js?v=20260713p"></script>
<script>
let barChart, pieChart;

function setStat(id, value, opts = {}) {
  const el = document.getElementById(id);
  if (!el) return;
  el.dataset.target = value;
  el.dataset.decimals = opts.decimals ?? '';
  el.dataset.suffix = opts.suffix ?? '';
  el.dataset.animated = '0';
}

function renderTracking(data) {
  const s = data.summary || {};
  setStat('sApplied', s.applied ?? 0);
  setStat('sShortlisted', s.shortlisted ?? 0);
  setStat('sInterviewed', s.interviewed ?? 0);
  setStat('sOffered', s.offered ?? 0);
  setStat('sJoined', s.joined ?? 0);
  setStat('sConversion', s.conversion ?? 0, { decimals: 1, suffix: '%' });
  animateCounters(document.getElementById('trackingStats'));

  const funnel = data.funnel || {};
  destroyChart(document.getElementById('trackBar'));
  barChart = Charts.bar(
    document.getElementById('trackBar'),
    funnel.labels || [],
    funnel.values || [],
    'Candidates'
  );

  const offer = data.offerStatus || {};
  destroyChart(document.getElementById('trackPie'));
  pieChart = Charts.doughnut(
    document.getElementById('trackPie'),
    offer.labels || [],
    offer.values || []
  );

  const rows = data.candidates || [];
  document.getElementById('tr').innerHTML = rows.length ? rows.map(c => `
    <tr>
      <td><strong>${c.student || '—'}</strong></td>
      <td>${c.company || '—'}</td>
      <td>${c.role || '—'}</td>
      <td>${c.stage || '—'}</td>
      <td>${c.updatedAt ? formatRelativeTime(c.updatedAt) : '—'}</td>
      <td><span class="badge-soft ${c.badge || 'muted'}">${c.stage || '—'}</span></td>
    </tr>`).join('')
    : '<tr><td colspan="6" class="text-muted-2 p-4">No candidate activity yet.</td></tr>';
}

document.getElementById('exportBtn').addEventListener('click', () => toast('Export will download the current candidate list.', 'info'));

onAppReady(async () => {
  showPageAlert('trackingAlert', 'info', 'Loading placement tracking…');
  try {
    const data = await TrackingStore.fetch();
    showPageAlert('trackingAlert', 'hide');
    renderTracking(data || {
      summary: { applied: 0, shortlisted: 0, interviewed: 0, offered: 0, joined: 0, conversion: 0 },
      funnel: { labels: ['Applied','Shortlisted','Test','Interview','Offered','Joined'], values: [0,0,0,0,0,0] },
      offerStatus: { labels: ['Single Offer','Multiple Offers','No Offer Yet'], values: [0,0,0] },
      candidates: [],
    });
  } catch (e) {
    showPageAlert('trackingAlert', 'danger', 'Failed to load placement tracking.');
    renderTracking({
      summary: { applied: 0, shortlisted: 0, interviewed: 0, offered: 0, joined: 0, conversion: 0 },
      funnel: { labels: ['Applied','Shortlisted','Test','Interview','Offered','Joined'], values: [0,0,0,0,0,0] },
      offerStatus: { labels: ['Single Offer','Multiple Offers','No Offer Yet'], values: [0,0,0] },
      candidates: [],
    });
  }
});
</script></body></html>
