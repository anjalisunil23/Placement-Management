<!doctype html><html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Reports · PlaceHub</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="css/style.css" rel="stylesheet"/></head>
<body data-page="reports.html"><div class="app">
<aside class="sidebar" id="sidebar"></aside><div class="main"><header class="topbar" id="topbar"></header><main class="page">

<div class="page-header">
  <div><h1 class="page-title">Reports Center</h1><p class="page-sub">Generate, schedule and download placement reports.</p></div>
  <div class="d-flex gap-2"><input type="date" class="form-control" style="width:auto"/><input type="date" class="form-control" style="width:auto"/><button class="btn btn-primary"><i class="bi bi-funnel me-1"></i>Apply</button></div>
</div>

<div class="row g-3" id="rep"></div>

<div class="card-surface mt-3 p-3 p-md-4">
  <h6 class="fw-bold mb-3">Export options</h6>
  <div class="d-flex flex-wrap gap-2">
    <button class="btn btn-outline-secondary"><i class="bi bi-file-earmark-pdf me-1 text-danger"></i>PDF</button>
    <button class="btn btn-outline-secondary"><i class="bi bi-file-earmark-spreadsheet me-1 text-success"></i>Excel</button>
    <button class="btn btn-outline-secondary"><i class="bi bi-filetype-csv me-1"></i>CSV</button>
    <button class="btn btn-outline-secondary"><i class="bi bi-google me-1"></i>Sheets</button>
    <button class="btn btn-outline-secondary"><i class="bi bi-envelope me-1"></i>Email</button>
  </div>
</div>

</main></div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script>
const r=[
 ["Student Placement Status Report","Individual placement records per student","bi-person-vcard","info"],
 ["Department Placement Report","Branch-wise placement statistics","bi-diagram-3","primary"],
 ["Company Recruitment Report","Company-wise hiring & selection count","bi-building","success"],
 ["Monthly Placement Report","Month-wise offers and activity","bi-calendar-month","warning"],
 ["Annual Placement Report","FY summary for management","bi-file-earmark-bar-graph","primary"],
 ["Selection Count Report","Shortlisted vs selected breakdown","bi-check2-square","success"],
];
document.getElementById("rep").innerHTML=r.map(x=>`
 <div class="col-md-6 col-xl-4"><div class="card-surface p-4 h-100">
   <div class="d-flex justify-content-between mb-3">
     <div class="ic" style="background:color-mix(in srgb,var(--primary) 12%,transparent);color:var(--primary)"><i class="bi ${x[2]}"></i></div>
     <span class="badge-soft ${x[3]}">Ready</span>
   </div>
   <h6 class="fw-bold mb-1">${x[0]}</h6>
   <p class="text-muted-2 small mb-3">${x[1]}</p>
   <div class="d-flex gap-2 flex-wrap">
     <button class="btn btn-sm btn-primary" onclick="toast('PDF export started (demo).','info')"><i class="bi bi-file-earmark-pdf me-1"></i>PDF</button>
     <button class="btn btn-sm btn-outline-secondary" onclick="toast('Excel export started (demo).','info')"><i class="bi bi-file-earmark-spreadsheet me-1"></i>Excel</button>
     <button class="btn btn-sm btn-outline-secondary" onclick="toast('Sent to management & staff (demo).','success')"><i class="bi bi-envelope me-1"></i>Send</button>
   </div>
 </div></div>`).join("");
document.querySelectorAll('.card-surface.mt-3 button').forEach((btn,i)=>{
  const types=['PDF','Excel','CSV'];
  if(types[i]) btn.onclick=()=>toast(`${types[i]} export started (demo).`,'info');
});
</script></body></html>
