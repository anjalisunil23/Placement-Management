<!doctype html><html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Departments · PlaceHub</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="css/style.css" rel="stylesheet"/></head>
<body data-page="departments.html"><div class="app">
<aside class="sidebar" id="sidebar"></aside><div class="main"><header class="topbar" id="topbar"></header><main class="page">

<div class="page-header">
  <div><h1 class="page-title">Departments</h1><p class="page-sub">Manage academic departments and branch codes used across placement drives.</p></div>
  <button class="btn btn-primary" id="btnAdd"><i class="bi bi-plus-lg me-1"></i>Add department</button>
</div>

<div class="row g-3 mb-3">
  <div class="col-6 col-md-4"><div class="card-surface stat-card"><div class="lbl">Total departments</div><div class="val" id="statTotal">0</div></div></div>
</div>

<div class="card-surface">
  <div class="table-wrap">
    <table class="table-modern"><thead><tr><th>Department name</th><th>Code</th><th>Actions</th></tr></thead>
    <tbody id="deptRows"></tbody></table>
  </div>
</div>

<div class="modal fade" id="deptModal" tabindex="-1"><div class="modal-dialog modal-dialog-centered"><div class="modal-content">
  <div class="modal-header"><h5 class="modal-title fw-bold" id="deptModalTitle">Add department</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
  <form id="deptForm">
    <input type="hidden" id="deptId"/>
    <div class="modal-body row g-3">
      <div class="col-12"><label class="form-label small fw-semibold">Department name</label><input class="form-control" id="deptName" required placeholder="e.g. Computer Science"/></div>
      <div class="col-12"><label class="form-label small fw-semibold">Code</label><input class="form-control" id="deptCode" required placeholder="e.g. CSE" maxlength="10"/></div>
    </div>
    <div class="modal-footer"><button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button><button type="submit" class="btn btn-primary">Save</button></div>
  </form>
</div></div></div>

</main></div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script>
const deptModal = () => bootstrap.Modal.getInstance(document.getElementById('deptModal')) || new bootstrap.Modal(document.getElementById('deptModal'));
let editingId = null;

function openAdd() {
  editingId = null;
  document.getElementById('deptModalTitle').textContent = 'Add department';
  document.getElementById('deptId').value = '';
  document.getElementById('deptName').value = '';
  document.getElementById('deptCode').value = '';
  deptModal().show();
}

function openEdit(id) {
  const d = DepartmentStore.all().find(x => x.id === id);
  if (!d) return;
  editingId = id;
  document.getElementById('deptModalTitle').textContent = 'Edit department';
  document.getElementById('deptId').value = id;
  document.getElementById('deptName').value = d.name || '';
  document.getElementById('deptCode').value = d.code || '';
  deptModal().show();
}

function removeDept(id) {
  const d = DepartmentStore.all().find(x => x.id === id);
  if (!d) return;
  if (!confirm(`Delete department "${d.name}" (${d.code})?`)) return;
  DepartmentStore.remove(id);
  toast('Department removed.', 'success');
  render();
}

function render() {
  const list = DepartmentStore.all();
  document.getElementById('statTotal').textContent = list.length;
  document.getElementById('deptRows').innerHTML = list.length ? list.map(d => `
    <tr>
      <td><strong>${d.name}</strong></td>
      <td><span class="badge-soft primary">${d.code}</span></td>
      <td>
        <div class="d-flex gap-1">
          <button class="btn btn-sm btn-outline-primary" onclick="openEdit('${d.id}')"><i class="bi bi-pencil"></i></button>
          <button class="btn btn-sm btn-outline-danger" onclick="removeDept('${d.id}')"><i class="bi bi-trash"></i></button>
        </div>
      </td>
    </tr>`).join('') : '<tr><td colspan="3" class="text-muted-2 p-4">No departments yet. Add one to get started.</td></tr>';
}

document.getElementById('btnAdd').addEventListener('click', openAdd);

document.getElementById('deptForm').addEventListener('submit', e => {
  e.preventDefault();
  const name = document.getElementById('deptName').value.trim();
  const code = document.getElementById('deptCode').value.trim();
  if (!name || !code) return;
  if (editingId) {
    DepartmentStore.update(editingId, { name, code: code.toUpperCase() });
    toast('Department updated.', 'success');
  } else {
    DepartmentStore.add({ name, code });
    toast('Department added.', 'success');
  }
  deptModal().hide();
  render();
});

render();
</script></body></html>
