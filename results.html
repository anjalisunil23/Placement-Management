<!doctype html><html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Recruitment Results · AJCE Placements</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="css/style.css?v=20260711f" rel="stylesheet"/></head>
<body data-page="results.html"><div class="app">
<aside class="sidebar" id="sidebar"></aside><div class="main"><header class="topbar" id="topbar"></header><main class="page">

<div class="page-header">
  <div><h1 class="page-title">Recruitment Results</h1><p class="page-sub">Record placement outcomes — selected or rejected — with package and joining details.</p></div>
</div>

<div class="row g-3 mb-3">
  <div class="col-6 col-md-3"><div class="card-surface stat-card"><div class="lbl">Total results</div><div class="val" id="statTotal">0</div></div></div>
  <div class="col-6 col-md-3"><div class="card-surface stat-card"><div class="lbl">Selected</div><div class="val" id="statSelected">0</div></div></div>
  <div class="col-6 col-md-3"><div class="card-surface stat-card"><div class="lbl">Rejected</div><div class="val" id="statRejected">0</div></div></div>
</div>

<div class="row g-3">
  <div class="col-lg-4">
    <div class="card-surface p-3">
      <h2 class="h6 fw-bold mb-3" id="formTitle">Add result</h2>
      <form id="resultForm">
        <input type="hidden" id="resultId"/>
        <div class="mb-3">
          <label class="form-label small fw-semibold">Student name</label>
          <input class="form-control" id="studentName" required placeholder="e.g. Rahul Verma"/>
        </div>
        <div class="mb-3">
          <label class="form-label small fw-semibold">Register number</label>
          <input class="form-control" id="registerNumber" required placeholder="e.g. 21IT012"/>
        </div>
        <div class="mb-3">
          <label class="form-label small fw-semibold">Company</label>
          <input class="form-control" id="company" required placeholder="e.g. Microsoft"/>
        </div>
        <div class="mb-3">
          <label class="form-label small fw-semibold">Role</label>
          <input class="form-control" id="role" required placeholder="e.g. SWE"/>
        </div>
        <div class="mb-3">
          <label class="form-label small fw-semibold">Package</label>
          <input class="form-control" id="package" placeholder="e.g. ₹52 LPA"/>
        </div>
        <div class="mb-3">
          <label class="form-label small fw-semibold">Status</label>
          <select class="form-select" id="status" required>
            <option value="selected">Selected</option>
            <option value="rejected">Rejected</option>
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label small fw-semibold">Joining date</label>
          <input class="form-control" type="date" id="joiningDate"/>
        </div>
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary flex-grow-1" id="btnSave">Save result</button>
          <button type="button" class="btn btn-outline-secondary d-none" id="btnCancel">Cancel</button>
        </div>
      </form>
    </div>
  </div>
  <div class="col-lg-8">
    <div class="card-surface">
      <div class="table-wrap">
        <table class="table-modern"><thead><tr>
          <th>Student</th><th>Register No</th><th>Company</th><th>Role</th><th>Package</th><th>Status</th><th>Joining</th><th>Actions</th>
        </tr></thead><tbody id="resultRows"></tbody></table>
      </div>
    </div>
  </div>
</div>

</main></div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/admin-api.js?v=20260622d"></script>
<script src="js/officer-api.js?v=20260622d"></script>
<script src="js/api.js?v=20260711b"></script>
<script src="js/app.js?v=20260711f"></script>
<script>
let editingId = null;

function resultStatusBadge(status) {
  const map = { selected:['success','Selected'], rejected:['danger','Rejected'] };
  const [cls, label] = map[status] || ['muted', status];
  return `<span class="badge-soft ${cls}">${label}</span>`;
}

function resetForm() {
  editingId = null;
  document.getElementById('formTitle').textContent = 'Add result';
  document.getElementById('resultId').value = '';
  document.getElementById('resultForm').reset();
  document.getElementById('btnCancel').classList.add('d-none');
}

function editResult(id) {
  const r = RecruitmentResults.all().find(x => x.id === id);
  if (!r) return;
  editingId = id;
  document.getElementById('formTitle').textContent = 'Update result';
  document.getElementById('resultId').value = id;
  document.getElementById('studentName').value = r.studentName || '';
  document.getElementById('registerNumber').value = r.registerNumber || '';
  document.getElementById('company').value = r.company || '';
  document.getElementById('role').value = r.role || '';
  document.getElementById('package').value = r.package || '';
  document.getElementById('status').value = r.status || 'selected';
  document.getElementById('joiningDate').value = r.joiningDate || '';
  document.getElementById('btnCancel').classList.remove('d-none');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

async function deleteResult(id) {
  const r = RecruitmentResults.all().find(x => x.id === id);
  if (!r) return;
  if (!(await confirmAction({
    title: 'Delete result',
    message: `Delete result for ${r.studentName} at ${r.company}?`,
    confirmText: 'Delete',
    variant: 'danger',
  }))) return;
  RecruitmentResults.remove(id).then(() => {
    if (editingId === id) resetForm();
    toast('Result removed.', 'success');
    render();
  });
}

function render() {
  const all = RecruitmentResults.all();
  document.getElementById('statTotal').textContent = all.length;
  document.getElementById('statSelected').textContent = all.filter(r => r.status === 'selected').length;
  document.getElementById('statRejected').textContent = all.filter(r => r.status === 'rejected').length;

  document.getElementById('resultRows').innerHTML = all.length ? all.map(r => `
    <tr>
      <td class="fw-semibold small">${r.studentName}</td>
      <td>${r.registerNumber}</td>
      <td>${r.company}</td>
      <td>${r.role}</td>
      <td>${r.package || '—'}</td>
      <td>${resultStatusBadge(r.status)}</td>
      <td>${r.joiningDate ? formatDate(r.joiningDate) : '—'}</td>
      <td><div class="d-flex gap-1">
        <button class="btn btn-sm btn-outline-primary" onclick="editResult('${r.id}')" title="Edit"><i class="bi bi-pencil"></i></button>
        <button class="btn btn-sm btn-outline-danger" onclick="deleteResult('${r.id}')" title="Delete"><i class="bi bi-trash"></i></button>
      </div></td>
    </tr>`).join('') : '<tr><td colspan="8" class="text-muted-2 p-4">No results recorded yet.</td></tr>';
}

document.getElementById('resultForm').addEventListener('submit', async e => {
  e.preventDefault();
  const payload = {
    id: editingId || undefined,
    studentName: document.getElementById('studentName').value.trim(),
    registerNumber: document.getElementById('registerNumber').value.trim(),
    company: document.getElementById('company').value.trim(),
    role: document.getElementById('role').value.trim(),
    package: document.getElementById('package').value.trim(),
    status: document.getElementById('status').value,
    joiningDate: document.getElementById('joiningDate').value,
  };
  if (!(await confirmAction({
    title: editingId ? 'Update result' : 'Add result',
    message: `${editingId ? 'Update' : 'Add'} recruitment result for ${payload.studentName}?`,
    confirmText: editingId ? 'Update' : 'Add',
    variant: 'primary',
  }))) return;
  await RecruitmentResults.upsert(payload);
  toast(editingId ? 'Result updated.' : 'Result added.', 'success');
  resetForm();
  render();
});

document.getElementById('btnCancel').addEventListener('click', resetForm);

async function initResultsPage() {
  if (typeof canManageDrives === 'function' && canManageDrives()) {
    window.location.replace('drives.html');
    return;
  }
  await RecruitmentResults.fetch();
  render();
}
onAppReady(() => initResultsPage());
</script></body></html>
