<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Placement Drives — PMS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/frontend/assets/css/style.css" rel="stylesheet">
</head>
<body data-pms-fallback="/frontend/pages/student/dashboard.html">
  <nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid"><a class="navbar-brand" href="dashboard.html">PMS — Drives</a></div>
  </nav>
  <div class="container p-4">
    <h2>Available Placement Drives</h2>
    <div id="drivesList" class="row g-3 mt-2"></div>
  </div>
  <script src="/frontend/assets/js/api.js"></script>
  <script src="/frontend/assets/js/nav.js"></script>
  <script>
    PMS.requireAuth(['student']);
    PMS.get('/student/drives').then(res => {
      document.getElementById('drivesList').innerHTML = res.data.map(d => `
        <div class="col-md-6">
          <div class="card p-3 ${d.eligibility?.eligible ? 'border-success' : 'border-secondary'}">
            <h5>${d.title}</h5>
            <p class="mb-1"><small>Type: ${d.type} | Date: ${d.date} ${d.time}</small></p>
            <p class="mb-2">${d.eligibility?.eligible ? '<span class="badge bg-success">Eligible</span>' : '<span class="badge bg-danger">Not Eligible</span>'}</p>
            ${!d.eligibility?.eligible ? `<small class="text-danger">${(d.eligibility?.reasons || []).join(' ')}</small>` : ''}
            ${d.eligibility?.eligible ? `<button class="btn btn-sm btn-pms mt-2" onclick="apply('${d._id}')">Apply</button>` : ''}
          </div>
        </div>`).join('') || '<p class="text-muted">No drives available.</p>';
    });

    async function apply(driveId) {
      try {
        await PMS.post('/student/apply', { driveId });
        alert('Application submitted!');
      } catch (e) { alert(e.message); }
    }
  </script>
</body>
</html>
