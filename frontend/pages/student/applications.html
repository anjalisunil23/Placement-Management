<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Applications — PMS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/frontend/assets/css/style.css" rel="stylesheet">
</head>
<body data-pms-fallback="/frontend/pages/student/dashboard.html">
  <nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid"><a class="navbar-brand" href="dashboard.html">PMS — Applications</a></div>
  </nav>
  <div class="container p-4">
    <h2>Application Status</h2>
    <table class="table table-pms table-striped mt-3">
      <thead><tr><th>Drive</th><th>Status</th><th>Applied On</th><th>Actions</th></tr></thead>
      <tbody id="appTable"></tbody>
    </table>
  </div>
  <script src="/frontend/assets/js/api.js"></script>
  <script src="/frontend/assets/js/nav.js"></script>
  <script>
    PMS.requireAuth(['student']);
    PMS.get('/student/applications').then(res => {
      document.getElementById('appTable').innerHTML = res.data.map(a => `
        <tr>
          <td>${a.driveId}</td>
          <td><span class="badge bg-primary">${a.status}</span></td>
          <td>${a.createdAt || ''}</td>
          <td>${!['selected','rejected','withdrawn'].includes(a.status) ? `<button class="btn btn-sm btn-secondary" onclick="withdraw('${a._id}')">Withdraw</button>` : ''}</td>
        </tr>`).join('') || '<tr><td colspan="4">No applications yet.</td></tr>';
    });
    const withdraw = id => { if (confirm('Withdraw application?')) PMS.post(`/student/applications/${id}/withdraw`).then(() => location.reload()); };
  </script>
</body>
</html>
