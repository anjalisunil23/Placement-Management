<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resume Upload — PMS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/frontend/assets/css/style.css" rel="stylesheet">
</head>
<body data-pms-fallback="/frontend/pages/student/dashboard.html">
  <nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid"><a class="navbar-brand" href="dashboard.html">PMS — Resume</a></div>
  </nav>
  <div class="container p-4 col-md-6">
    <h2>Resume Upload</h2>
    <div class="alert alert-info">
      Filename format: <strong>Name_RegisterNo_Resume.pdf</strong><br>
      Example: <code>Student_21MCA001_Resume.pdf</code><br>
      Allowed: PDF, DOC, DOCX
    </div>
    <form id="resumeForm">
      <input type="file" class="form-control mb-3" id="resume" accept=".pdf,.doc,.docx" required>
      <button type="submit" class="btn btn-pms">Upload Resume</button>
    </form>
    <div id="status" class="mt-3"></div>
  </div>
  <script src="/frontend/assets/js/api.js"></script>
  <script src="/frontend/assets/js/nav.js"></script>
  <script>
    PMS.requireAuth(['student']);
    PMS.get('/student/profile').then(res => {
      const r = res.data.resume;
      if (r) {
        document.getElementById('status').innerHTML = `<div class="alert alert-${r.verified ? 'success' : 'warning'}">
          Uploaded: ${r.filename} — ${r.verified ? 'Verified' : 'Pending verification'}
        </div>`;
      }
    });

    document.getElementById('resumeForm').addEventListener('submit', async e => {
      e.preventDefault();
      const fd = new FormData();
      fd.append('resume', document.getElementById('resume').files[0]);
      try {
        await PMS.upload('/student/resume', fd);
        document.getElementById('status').innerHTML = '<div class="alert alert-success">Resume uploaded. Awaiting admin verification.</div>';
      } catch (err) {
        document.getElementById('status').innerHTML = `<div class="alert alert-danger">${err.message}</div>`;
      }
    });
  </script>
</body>
</html>
