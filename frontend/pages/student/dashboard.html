<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Dashboard — PMS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/frontend/assets/css/style.css" rel="stylesheet">
</head>
<body data-pms-fallback="/frontend/pages/login.html /frontend/pages/student/dashboard.html">
  <nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
      <span class="navbar-brand">PMS — Student</span>
      <button class="btn btn-outline-light btn-sm" onclick="PMS.logout()">Logout</button>
    </div>
  </nav>
  <div class="container-fluid">
    <div class="row">
      <nav class="col-md-2 sidebar p-3">
        <ul class="nav flex-column">
          <li class="nav-item"><a class="nav-link active" href="dashboard.html">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link" href="profile.html">Profile</a></li>
          <li class="nav-item"><a class="nav-link" href="resume.html">Resume</a></li>
          <li class="nav-item"><a class="nav-link" href="drives.html">Drives & Apply</a></li>
          <li class="nav-item"><a class="nav-link" href="applications.html">My Applications</a></li>
        </ul>
      </nav>
      <main class="col-md-10 p-4">
        <h2>Student Dashboard</h2>
        <p class="text-muted">Welcome, <span id="userName"></span></p>
        <div class="row g-3 mt-2">
          <div class="col-md-4"><div class="card stat-card p-3"><div class="text-muted">Chances Used</div><div class="stat-value" id="chancesUsed">—</div></div></div>
          <div class="col-md-4"><div class="card stat-card p-3"><div class="text-muted">Chances Remaining</div><div class="stat-value" id="chancesLeft">—</div></div></div>
          <div class="col-md-4"><div class="card stat-card p-3"><div class="text-muted">CGPA</div><div class="stat-value" id="cgpa">—</div></div></div>
        </div>
        <div class="mt-4" id="notifications"></div>
      </main>
    </div>
  </div>
  <script src="/frontend/assets/js/api.js"></script>
  <script src="/frontend/assets/js/nav.js"></script>
  <script>
    const user = PMS.requireAuth(['student']);
    if (user) document.getElementById('userName').textContent = user.name;

    Promise.all([
      PMS.get('/student/profile'),
      PMS.get('/student/placement-history'),
      PMS.get('/student/notifications')
    ]).then(([profile, history, notifs]) => {
      const ac = profile.data.academic || {};
      const ch = history.data.chances || {};
      document.getElementById('cgpa').textContent = ac.cgpa ?? '—';
      document.getElementById('chancesUsed').textContent = ch.used ?? 0;
      document.getElementById('chancesLeft').textContent = ch.remaining ?? 0;
      document.getElementById('notifications').innerHTML = '<h5>Notifications</h5>' +
        (notifs.data.length ? notifs.data.slice(0,5).map(n => `<div class="alert alert-info py-2">${n.title}: ${n.message}</div>`).join('') : '<p class="text-muted">No notifications.</p>');
    });
  </script>
</body>
</html>
