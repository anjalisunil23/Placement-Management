<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — PMS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/frontend/assets/css/style.css" rel="stylesheet">
</head>
<body data-pms-fallback="/frontend/pages/login.html">
  <div class="auth-wrapper">
    <div class="container py-4">
      <div class="row justify-content-center">
        <div class="col-lg-7">
          <div class="card auth-card">
            <div class="card-body p-5">
              <h2 class="fw-bold text-center mb-4">Register</h2>
              <div id="alert" class="alert d-none"></div>
              <form id="regForm">
                <div class="row g-3">
                  <div class="col-md-6">
                    <label class="form-label">Full Name</label>
                    <input type="text" class="form-control" id="name" required>
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" required>
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" required minlength="8">
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">Role</label>
                    <select class="form-select" id="role" required>
                      <option value="student">Student</option>
                      <option value="staff">Staff</option>
                      <option value="company">Company</option>
                      <option value="alumni">Alumni</option>
                    </select>
                  </div>
                  <div class="col-md-6 student-field">
                    <label class="form-label">Register Number</label>
                    <input type="text" class="form-control" id="registerNumber" placeholder="21MCA001">
                  </div>
                  <div class="col-md-6 student-field">
                    <label class="form-label">Department ID</label>
                    <input type="text" class="form-control" id="departmentId" placeholder="MongoDB ObjectId">
                  </div>
                  <div class="col-md-6 company-field d-none">
                    <label class="form-label">Company Name</label>
                    <input type="text" class="form-control" id="companyName">
                  </div>
                  <div class="col-md-6 company-field d-none">
                    <label class="form-label">Category</label>
                    <select class="form-select" id="category">
                      <option>Software</option>
                      <option>Mechanical</option>
                      <option>Chemical</option>
                      <option>Food</option>
                      <option>Production</option>
                    </select>
                  </div>
                </div>
                <button type="submit" class="btn btn-pms w-100 mt-4 py-2">Register</button>
              </form>
              <p class="text-center mt-3 mb-0"><a href="login.html">Already have an account?</a></p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="/frontend/assets/js/api.js"></script>
  <script src="/frontend/assets/js/nav.js"></script>
  <script>
    const roleEl = document.getElementById('role');
    roleEl.addEventListener('change', () => {
      const role = roleEl.value;
      document.querySelectorAll('.student-field').forEach(el => el.classList.toggle('d-none', role !== 'student'));
      document.querySelectorAll('.company-field').forEach(el => el.classList.toggle('d-none', role !== 'company'));
    });

    document.getElementById('regForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const alert = document.getElementById('alert');
      const payload = {
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        password: document.getElementById('password').value,
        role: roleEl.value
      };
      if (payload.role === 'student') {
        payload.registerNumber = document.getElementById('registerNumber').value;
        payload.departmentId = document.getElementById('departmentId').value;
      }
      if (payload.role === 'company') {
        payload.companyName = document.getElementById('companyName').value;
        payload.category = document.getElementById('category').value;
      }
      try {
        await PMS.post('/auth/register', payload);
        alert.className = 'alert alert-success';
        alert.textContent = 'Registration successful! Awaiting admin approval.';
        alert.classList.remove('d-none');
      } catch (err) {
        alert.className = 'alert alert-danger';
        alert.textContent = err.message;
        alert.classList.remove('d-none');
      }
    });
  </script>
</body>
</html>
