<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Placement Officer — PMS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/frontend/assets/css/style.css" rel="stylesheet">
</head>
<body data-pms-fallback="/frontend/pages/login.html">
  <nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
      <span class="navbar-brand">PMS — Placement Officer</span>
      <button class="btn btn-outline-light btn-sm" onclick="PMS.logout()">Logout</button>
    </div>
  </nav>
  <div class="container p-4">
    <h2>Placement Officer Dashboard</h2>
    <div id="deptBanner" class="alert alert-info d-none"></div>
    <p>
      <a href="drives.html">Manage Drives</a> ·
      <a href="applications.html">Pending Applications</a> ·
      <a href="students.html">Approve Students</a>
    </p>
    <div class="row mt-4" id="stats"></div>
  </div>
  <script src="/frontend/assets/js/api.js"></script>
  <script src="/frontend/assets/js/nav.js"></script>
  <script>
    PMS.requireAuth(['placement_officer', 'admin']);

    async function init() {
      const res = await PMS.get('/officer/profile');
      const { isAdmin, department } = res.data;
      if (isAdmin) {
        document.getElementById('deptBanner').className = 'alert alert-secondary';
        document.getElementById('deptBanner').textContent = 'Admin view — all departments';
        document.getElementById('deptBanner').classList.remove('d-none');
      } else if (department) {
        document.getElementById('deptBanner').textContent =
          `Assigned department: ${department.name} (${department.code})`;
        document.getElementById('deptBanner').classList.remove('d-none');
      }

      const [apps, students, drives] = await Promise.all([
        PMS.get('/officer/applications/pending'),
        PMS.get('/officer/students/pending'),
        PMS.get('/officer/drives'),
      ]);
      document.getElementById('stats').innerHTML = `
        <div class="col-md-4"><div class="card p-3"><h5>${drives.data.length}</h5><small>Drives</small></div></div>
        <div class="col-md-4"><div class="card p-3"><h5>${apps.data.length}</h5><small>Pending Applications</small></div></div>
        <div class="col-md-4"><div class="card p-3"><h5>${students.data.length}</h5><small>Pending Students</small></div></div>`;
    }
    init();
  </script>
</body>
</html>
