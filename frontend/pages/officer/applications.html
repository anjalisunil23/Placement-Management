<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pending Applications — Officer</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/frontend/assets/css/style.css" rel="stylesheet">
</head>
<body data-pms-fallback="/frontend/pages/officer/dashboard.html">
  <nav class="navbar navbar-dark bg-dark"><div class="container-fluid"><a class="navbar-brand" href="dashboard.html">PMS — Pending Applications</a></div></nav>
  <div class="container p-4">
    <div id="deptNote" class="alert alert-info d-none mb-3"></div>
    <h2>Applications Pending Officer Approval</h2>
    <table class="table table-pms table-striped mt-3">
      <thead><tr><th>Student</th><th>Drive</th><th>Status</th><th>Action</th></tr></thead>
      <tbody id="tbl"></tbody>
    </table>
  </div>
  <script src="/frontend/assets/js/api.js"></script>
  <script src="/frontend/assets/js/nav.js"></script>
  <script>
    PMS.requireAuth(['placement_officer', 'admin']);

    async function init() {
      const prof = await PMS.get('/officer/profile');
      if (!prof.data.isAdmin && prof.data.department) {
        const d = prof.data.department;
        document.getElementById('deptNote').textContent = `Showing applications from ${d.name} (${d.code}) students only.`;
        document.getElementById('deptNote').classList.remove('d-none');
      }
      load();
    }

    async function load() {
      const res = await PMS.get('/officer/applications/pending');
      document.getElementById('tbl').innerHTML = res.data.map(a => `<tr>
        <td>${a.studentId}</td><td>${a.driveId}</td><td><span class="badge bg-info">${a.status}</span></td>
        <td>${a.status === 'resume_verified' ? `<button class="btn btn-sm btn-pms" onclick="approve('${a._id}')">Approve</button>` : '<small class="text-muted">Awaiting resume verification</small>'}</td>
      </tr>`).join('') || '<tr><td colspan="4">No pending applications.</td></tr>';
    }
    const approve = id => PMS.post(`/officer/applications/${id}/approve`).then(() => { alert('Approved'); load(); });
    init();
  </script>
</body>
</html>
