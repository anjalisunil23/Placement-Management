<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pending Students — Officer</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/frontend/assets/css/style.css" rel="stylesheet">
</head>
<body data-pms-fallback="/frontend/pages/officer/dashboard.html">
  <nav class="navbar navbar-dark bg-dark"><div class="container-fluid"><a class="navbar-brand" href="dashboard.html">PMS — Student Approvals</a></div></nav>
  <div class="container p-4">
    <div id="deptNote" class="alert alert-info d-none mb-3"></div>
    <h2>Pending Student Registrations</h2>
    <table class="table table-pms table-striped mt-3">
      <thead><tr><th>Name</th><th>Email</th><th>Status</th><th>Action</th></tr></thead>
      <tbody id="tbl"></tbody>
    </table>
  </div>
  <script src="/frontend/assets/js/api.js"></script>
  <script src="/frontend/assets/js/nav.js"></script>
  <script>
    PMS.requireAuth(['placement_officer', 'admin']);

    async function init() {
      const prof = await PMS.get('/officer/profile');
      if (!prof.data.isAdmin && prof.data.department) {
        const d = prof.data.department;
        document.getElementById('deptNote').textContent = `Showing pending students for ${d.name} (${d.code}) only.`;
        document.getElementById('deptNote').classList.remove('d-none');
      }
      load();
    }

    async function load() {
      const res = await PMS.get('/officer/students/pending');
      document.getElementById('tbl').innerHTML = res.data.map(u => `<tr>
        <td>${u.name}</td><td>${u.email}</td><td>${u.status}</td>
        <td><button class="btn btn-sm btn-pms" onclick="approve('${u._id}')">Approve Registration</button></td>
      </tr>`).join('') || '<tr><td colspan="4">No pending students.</td></tr>';
    }
    const approve = id => PMS.post(`/officer/users/${id}/approve`).then(() => { alert('Student approved'); load(); });
    init();
  </script>
</body>
</html>
