<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Placement Drives — Officer</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/frontend/assets/css/style.css" rel="stylesheet">
</head>
<body data-pms-fallback="/frontend/pages/officer/dashboard.html">
  <nav class="navbar navbar-dark bg-dark"><div class="container-fluid"><a class="navbar-brand" href="dashboard.html">PMS — Officer Drives</a></div></nav>
  <div class="container p-4">
    <div id="deptNote" class="alert alert-info d-none mb-3"></div>
    <h2>Create Placement Drive</h2>
    <form id="driveForm" class="col-md-8" enctype="multipart/form-data">
      <input class="form-control mb-2" name="title" placeholder="Drive Title" required>
      <input class="form-control mb-2" name="companyId" placeholder="Company ID (MongoDB ObjectId)" required>
      <select class="form-select mb-2" name="type" required>
        <option value="exclusive">Exclusive</option><option value="pooled">Pooled</option><option value="direct">Company Direct</option>
      </select>
      <input class="form-control mb-2" name="date" type="date" required>
      <input class="form-control mb-2" name="time" type="time" required>
      <input class="form-control mb-2" name="branches" id="branchesInput" placeholder='Branches JSON e.g. ["MCA","CSE"]'>
      <small class="text-muted d-block mb-2" id="branchesHint"></small>
      <input class="form-control mb-2" name="minCgpa" placeholder="Min CGPA" type="number" step="0.01">
      <select class="form-select mb-2" name="tier"><option>Tier 1</option><option selected>Tier 2</option><option>Tier 3</option></select>
      <label class="form-label">JD Attachment</label>
      <input class="form-control mb-3" name="jd" type="file" accept=".pdf,.doc,.docx">
      <button type="submit" class="btn btn-pms">Create Drive</button>
    </form>
    <h3 class="mt-5">Existing Drives</h3>
    <div id="drives"></div>
  </div>
  <script src="/frontend/assets/js/api.js"></script>
  <script src="/frontend/assets/js/nav.js"></script>
  <script>
    PMS.requireAuth(['placement_officer', 'admin']);
    let officerProfile = null;

    async function init() {
      const res = await PMS.get('/officer/profile');
      officerProfile = res.data;
      if (!officerProfile.isAdmin && officerProfile.department) {
        const code = officerProfile.department.code;
        document.getElementById('branchesInput').value = JSON.stringify([code]);
        document.getElementById('branchesInput').readOnly = true;
        document.getElementById('branchesHint').textContent =
          `Drives are scoped to your department (${officerProfile.department.name}).`;
        document.getElementById('deptNote').textContent =
          `Managing drives for ${officerProfile.department.name} (${code})`;
        document.getElementById('deptNote').classList.remove('d-none');
      }
      load();
    }

    async function load() {
      const res = await PMS.get('/officer/drives');
      document.getElementById('drives').innerHTML = res.data.map(d => `<div class="card p-3 mb-2"><strong>${d.title}</strong> — ${d.type} on ${d.date} ${d.time}${d.branches?.length ? ' · ' + d.branches.join(', ') : ''}</div>`).join('') || '<p class="text-muted">No drives yet.</p>';
    }
    document.getElementById('driveForm').addEventListener('submit', async e => {
      e.preventDefault();
      const f = e.target;
      const fd = new FormData();
      fd.append('title', f.title.value);
      fd.append('companyId', f.companyId.value);
      fd.append('type', f.type.value);
      fd.append('date', f.date.value);
      fd.append('time', f.time.value);
      fd.append('tier', f.tier.value);
      fd.append('branches', f.branches.value || '[]');
      fd.append('eligibility', JSON.stringify({ minCgpa: parseFloat(f.minCgpa.value) || 0 }));
      if (f.jd.files[0]) fd.append('jd', f.jd.files[0]);
      await PMS.upload('/officer/drives', fd);
      alert('Drive created');
      load();
    });
    init();
  </script>
</body>
</html>
