<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Recommendations — Staff</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/frontend/assets/css/style.css" rel="stylesheet">
</head>
<body data-pms-fallback="/frontend/pages/staff/dashboard.html">
  <div class="container p-4">
    <h2>Company Recommendations</h2>
    <div id="list" class="mt-3"></div>
  </div>
  <script src="/frontend/assets/js/api.js"></script>
  <script src="/frontend/assets/js/nav.js"></script>
  <script>
    PMS.requireAuth(['staff']);
    PMS.get('/staff/recommendations').then(res => {
      document.getElementById('list').innerHTML = res.data.map(r => `<div class="card p-3 mb-2">
        <strong>${r.companyName}</strong> (${r.category})<br>
        <small>${r.reason}</small><br>
        Contact: ${(r.contact||{}).name} — ${(r.contact||{}).email}
      </div>`).join('') || '<p class="text-muted">No recommendations yet.</p>';
    });
  </script>
</body>
</html>
