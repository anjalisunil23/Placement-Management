<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recommend Company — PMS Staff</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/frontend/assets/css/style.css" rel="stylesheet">
</head>
<body data-pms-fallback="/frontend/pages/staff/dashboard.html">
  <div class="container p-4 col-md-6">
    <h2>Company Recommendation</h2>
    <form id="recForm">
      <input class="form-control mb-2" id="companyName" placeholder="Company Name" required>
      <select class="form-select mb-2" id="category">
        <option>Software</option><option>Mechanical</option><option>Chemical</option>
      </select>
      <textarea class="form-control mb-2" id="reason" placeholder="Reason for recommendation" required></textarea>
      <h6>Referral Contact</h6>
      <input class="form-control mb-2" id="contactName" placeholder="Name" required>
      <input class="form-control mb-2" id="contactEmail" type="email" placeholder="Email" required>
      <input class="form-control mb-2" id="contactPhone" placeholder="Phone" required>
      <button type="submit" class="btn btn-pms">Submit Recommendation</button>
    </form>
  </div>
  <script src="/frontend/assets/js/api.js"></script>
  <script src="/frontend/assets/js/nav.js"></script>
  <script>
    PMS.requireAuth(['staff']);
    document.getElementById('recForm').addEventListener('submit', async e => {
      e.preventDefault();
      await PMS.post('/staff/recommendations', {
        companyName: document.getElementById('companyName').value,
        category: document.getElementById('category').value,
        reason: document.getElementById('reason').value,
        contact: {
          name: document.getElementById('contactName').value,
          email: document.getElementById('contactEmail').value,
          phone: document.getElementById('contactPhone').value
        }
      });
      alert('Recommendation submitted.');
    });
  </script>
</body>
</html>
