<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Placement Rules — PMS Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/frontend/assets/css/style.css" rel="stylesheet">
</head>
<body data-pms-fallback="/frontend/pages/admin/dashboard.html">
  <nav class="navbar navbar-dark bg-dark"><div class="container-fluid"><a class="navbar-brand" href="dashboard.html">PMS — Rules</a></div></nav>
  <div class="container p-4 col-md-8">
    <h2>Placement Rules</h2>
    <form id="ruleForm" class="mt-4">
      <div class="row g-3">
        <div class="col-md-6"><label class="form-label">Rule Name</label><input class="form-control" id="name" required></div>
        <div class="col-md-3"><label class="form-label">Min CGPA</label><input type="number" step="0.01" class="form-control" id="minCgpa" value="6.0"></div>
        <div class="col-md-3"><label class="form-label">Max Backlogs</label><input type="number" class="form-control" id="maxBacklogs" value="0"></div>
        <div class="col-md-4"><label class="form-label">Placement Chances</label><input type="number" class="form-control" id="placementChances" value="3"></div>
        <div class="col-12"><label class="form-label">Eligibility Criteria</label><textarea class="form-control" id="criteria" rows="3"></textarea></div>
      </div>
      <button type="submit" class="btn btn-pms mt-3">Create Rule</button>
    </form>
    <h4 class="mt-5">Active Rules</h4>
    <div id="rulesList"></div>
  </div>
  <script src="/frontend/assets/js/api.js"></script>
  <script src="/frontend/assets/js/nav.js"></script>
  <script>
    PMS.requireAuth(['admin']);
    async function load() {
      const res = await PMS.get('/admin/rules');
      document.getElementById('rulesList').innerHTML = res.data.map(r => `
        <div class="card p-3 mb-2 ${r.active ? 'border-success' : ''}">
          <strong>${r.name}</strong> — CGPA ≥ ${r.minCgpa}, Backlogs ≤ ${r.maxBacklogs}, Chances: ${r.placementChances}
          ${r.active ? '<span class="badge bg-success ms-2">Active</span>' : ''}
        </div>`).join('');
    }
    document.getElementById('ruleForm').addEventListener('submit', async e => {
      e.preventDefault();
      await PMS.post('/admin/rules', {
        name: document.getElementById('name').value,
        minCgpa: parseFloat(document.getElementById('minCgpa').value),
        maxBacklogs: parseInt(document.getElementById('maxBacklogs').value),
        placementChances: parseInt(document.getElementById('placementChances').value),
        eligibilityCriteria: document.getElementById('criteria').value,
        active: true
      });
      load();
    });
    load();
  </script>
</body>
</html>
