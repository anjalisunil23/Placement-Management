<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Control — PMS Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/frontend/assets/css/style.css" rel="stylesheet">
</head>
<body data-pms-fallback="/frontend/pages/admin/dashboard.html">
  <nav class="navbar navbar-dark bg-dark"><div class="container-fluid"><a class="navbar-brand" href="dashboard.html">PMS — Student Control</a></div></nav>
  <div class="container-fluid p-4">
    <h2>Student Management</h2>
    <p class="text-muted">Verify resumes, blacklist students, and manage placement records.</p>
    <table class="table table-pms table-striped mt-3">
      <thead><tr><th>Register No</th><th>CGPA</th><th>Resume</th><th>Placed</th><th>Actions</th></tr></thead>
      <tbody id="tbl"></tbody>
    </table>
  </div>
  <script src="/frontend/assets/js/api.js"></script>
  <script src="/frontend/assets/js/nav.js"></script>
  <script>
    PMS.requireAuth(['admin']);
    async function load() {
      const res = await PMS.get('/admin/students');
      document.getElementById('tbl').innerHTML = res.data.map(s => {
        const r = s.resume || {};
        return `<tr>
          <td>${s.registerNumber || s._id}</td>
          <td>${(s.academic||{}).cgpa ?? '—'}</td>
          <td>${r.filename ? (r.verified ? '<span class="badge bg-success">Verified</span>' : '<span class="badge bg-warning">Pending</span>') : '<span class="badge bg-secondary">None</span>'}</td>
          <td>${s.placed ? 'Yes' : 'No'}</td>
          <td>
            ${r.filename && !r.verified ? `<button class="btn btn-sm btn-success" onclick="verify('${s._id}')">Verify Resume</button>` : ''}
            <button class="btn btn-sm btn-danger" onclick="blacklist('${s._id}')">Blacklist</button>
            <button class="btn btn-sm btn-secondary" onclick="unblacklist('${s._id}')">Unblacklist</button>
          </td>
        </tr>`;
      }).join('') || '<tr><td colspan="5">No students found.</td></tr>';
    }
    const verify = id => PMS.post(`/admin/students/${id}/verify-resume`).then(() => { alert('Resume verified'); load(); });
    const blacklist = id => {
      const reason = prompt('Blacklist reason:');
      if (reason) PMS.post(`/admin/students/${id}/blacklist`, { reason }).then(load);
    };
    const unblacklist = id => PMS.post(`/admin/students/${id}/unblacklist`).then(load);
    load();
  </script>
</body>
</html>
