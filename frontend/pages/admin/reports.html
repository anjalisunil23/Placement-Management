<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reports — PMS Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/frontend/assets/css/style.css" rel="stylesheet">
</head>
<body data-pms-fallback="/frontend/pages/admin/dashboard.html">
  <nav class="navbar navbar-dark bg-dark"><div class="container-fluid"><a class="navbar-brand" href="dashboard.html">PMS — Reports</a></div></nav>
  <div class="container p-4">
    <h2>Generate Reports</h2>
    <div class="row g-3 mt-2">
      <div class="col-md-4"><div class="card p-4"><h5>Student Report</h5><button class="btn btn-pms" onclick="gen('student')">Generate PDF</button></div></div>
      <div class="col-md-4"><div class="card p-4"><h5>Company Report</h5><button class="btn btn-pms" onclick="gen('company')">Generate PDF</button></div></div>
      <div class="col-md-4"><div class="card p-4"><h5>Monthly Report</h5><button class="btn btn-pms" onclick="gen('monthly')">Generate PDF</button></div></div>
    </div>
    <div id="result" class="mt-4"></div>
  </div>
  <script src="/frontend/assets/js/api.js"></script>
  <script src="/frontend/assets/js/nav.js"></script>
  <script>
    PMS.requireAuth(['admin']);
    async function gen(type) {
      const res = await PMS.post(`/admin/reports/${type}`);
      document.getElementById('result').innerHTML = `<div class="alert alert-success">Report generated: ${res.data.filename}. <a href="${res.data.downloadUrl}" target="_blank">Download PDF</a></div>`;
    }
  </script>
</body>
</html>
