<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Companies — PMS Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/frontend/assets/css/style.css" rel="stylesheet">
</head>
<body data-pms-fallback="/frontend/pages/admin/dashboard.html">
  <nav class="navbar navbar-dark bg-dark"><div class="container-fluid"><a class="navbar-brand" href="dashboard.html">PMS — Companies</a></div></nav>
  <div class="container-fluid p-4">
    <div class="d-flex justify-content-between mb-3">
      <h2>Company Database</h2>
      <button class="btn btn-pms" data-bs-toggle="modal" data-bs-target="#addModal">Add Company</button>
    </div>
    <table class="table table-pms table-striped">
      <thead><tr><th>Name</th><th>Category</th><th>Tier</th><th>Status</th><th>Comments</th><th>Actions</th></tr></thead>
      <tbody id="tbl"></tbody>
    </table>
  </div>
  <div class="modal fade" id="addModal"><div class="modal-dialog"><div class="modal-content">
    <div class="modal-body">
      <input class="form-control mb-2" id="name" placeholder="Company Name">
      <select class="form-select mb-2" id="category"><option>Software</option><option>Mechanical</option><option>Chemical</option><option>Food</option><option>Production</option></select>
      <select class="form-select mb-2" id="tier"><option>Tier 1</option><option selected>Tier 2</option><option>Tier 3</option></select>
      <textarea class="form-control mb-2" id="comments" placeholder="Comments"></textarea>
      <button class="btn btn-pms" onclick="add()">Save</button>
    </div>
  </div></div></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/frontend/assets/js/api.js"></script>
  <script src="/frontend/assets/js/nav.js"></script>
  <script>
    PMS.requireAuth(['admin']);
    async function load() {
      const res = await PMS.get('/admin/companies');
      document.getElementById('tbl').innerHTML = res.data.map(c => `<tr>
        <td>${c.companyName}</td><td>${c.category}</td><td>${c.tier}</td><td>${c.associationStatus}</td><td>${c.comments||''}</td>
        <td><button class="btn btn-sm btn-danger" onclick="del('${c._id}')">Delete</button></td></tr>`).join('');
    }
    async function add() {
      await PMS.post('/admin/companies', {
        companyName: document.getElementById('name').value,
        category: document.getElementById('category').value,
        tier: document.getElementById('tier').value,
        comments: document.getElementById('comments').value
      });
      bootstrap.Modal.getInstance(document.getElementById('addModal')).hide();
      load();
    }
    const del = async id => { if (await confirmAction({ title: 'Delete company', message: 'Delete this company?', confirmText: 'Delete', variant: 'danger' })) PMS.del(`/admin/companies/${id}`).then(load); };
    load();
  </script>
</body>
</html>
