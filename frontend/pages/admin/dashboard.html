<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard — PMS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/frontend/assets/css/style.css" rel="stylesheet">
</head>
<body data-pms-fallback="/frontend/pages/login.html /frontend/pages/admin/dashboard.html">
  <nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
      <span class="navbar-brand">PMS — Admin</span>
      <div>
        <span class="text-light me-3" id="userName"></span>
        <button class="btn btn-outline-light btn-sm" onclick="PMS.logout()">Logout</button>
      </div>
    </div>
  </nav>
  <div class="container-fluid">
    <div class="row">
      <nav class="col-md-2 sidebar p-3">
        <ul class="nav flex-column">
          <li class="nav-item"><a class="nav-link active" href="dashboard.html"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a></li>
          <li class="nav-item"><a class="nav-link" href="users.html"><i class="bi bi-people me-2"></i>Users</a></li>
          <li class="nav-item"><a class="nav-link" href="students.html"><i class="bi bi-mortarboard me-2"></i>Student Control</a></li>
          <li class="nav-item"><a class="nav-link" href="companies.html"><i class="bi bi-building-check me-2"></i>Companies</a></li>
          <li class="nav-item"><a class="nav-link" href="departments.html"><i class="bi bi-building me-2"></i>Departments</a></li>
          <li class="nav-item"><a class="nav-link" href="rules.html"><i class="bi bi-shield-check me-2"></i>Placement Rules</a></li>
          <li class="nav-item"><a class="nav-link" href="reports.html"><i class="bi bi-file-pdf me-2"></i>Reports</a></li>
          <li class="nav-item"><a class="nav-link" href="analytics.html"><i class="bi bi-bar-chart me-2"></i>Analytics</a></li>
        </ul>
      </nav>
      <main class="col-md-10 p-4">
        <h2 class="mb-4">Admin Dashboard</h2>
        <div class="row g-4" id="statsRow">
          <div class="col-md-3"><div class="card stat-card p-3"><div class="text-muted">Total Students</div><div class="stat-value" id="totalStudents">—</div></div></div>
          <div class="col-md-3"><div class="card stat-card p-3"><div class="text-muted">Total Companies</div><div class="stat-value" id="totalCompanies">—</div></div></div>
          <div class="col-md-3"><div class="card stat-card p-3"><div class="text-muted">Placed Students</div><div class="stat-value" id="placedStudents">—</div></div></div>
          <div class="col-md-3"><div class="card stat-card p-3"><div class="text-muted">Pending Approvals</div><div class="stat-value text-warning" id="pendingApprovals">—</div></div></div>
        </div>
      </main>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/frontend/assets/js/api.js"></script>
  <script src="/frontend/assets/js/nav.js"></script>
  <script>
    const user = PMS.requireAuth(['admin']);
    if (user) document.getElementById('userName').textContent = user.name;

    PMS.get('/admin/dashboard').then(res => {
      const d = res.data;
      document.getElementById('totalStudents').textContent = d.totalStudents;
      document.getElementById('totalCompanies').textContent = d.totalCompanies;
      document.getElementById('placedStudents').textContent = d.placedStudents;
      document.getElementById('pendingApprovals').textContent = d.pendingApprovals;
    }).catch(err => console.error(err));
  </script>
</body>
</html>
