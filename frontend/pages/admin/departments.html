<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Departments — PMS Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/frontend/assets/css/style.css" rel="stylesheet">
</head>
<body data-pms-fallback="/frontend/pages/admin/dashboard.html">
  <nav class="navbar navbar-dark bg-dark"><div class="container-fluid"><a class="navbar-brand" href="dashboard.html">PMS — Departments</a></div></nav>
  <div class="container p-4">
    <div class="d-flex justify-content-between mb-4"><h2>Departments</h2>
      <button class="btn btn-pms" data-bs-toggle="modal" data-bs-target="#addModal">Add Department</button></div>
    <p class="text-muted">Each department can have exactly one placement officer.</p>
    <table class="table table-pms table-striped">
      <thead><tr><th>Name</th><th>Code</th><th>Placement Officer</th><th>Actions</th></tr></thead>
      <tbody id="tbl"></tbody>
    </table>
  </div>
  <div class="modal fade" id="addModal"><div class="modal-dialog"><div class="modal-content">
    <div class="modal-body">
      <input class="form-control mb-2" id="name" placeholder="Department Name">
      <input class="form-control mb-2" id="code" placeholder="Code (e.g. MCA)">
      <button class="btn btn-pms" onclick="add()">Save</button>
    </div>
  </div></div></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/frontend/assets/js/api.js"></script>
  <script src="/frontend/assets/js/nav.js"></script>
  <script>
    PMS.requireAuth(['admin']);
    async function load() {
      const res = await PMS.get('/admin/departments');
      document.getElementById('tbl').innerHTML = res.data.map(d => {
        const officer = d.placementOfficer
          ? `${d.placementOfficer.name} (${d.placementOfficer.email})`
          : '<span class="text-muted">— unassigned —</span>';
        return `
        <tr><td>${d.name}</td><td>${d.code}</td><td>${officer}</td>
        <td><button class="btn btn-sm btn-danger" onclick="del('${d._id}')" ${d.hasOfficer ? 'disabled title="Remove placement officer first"' : ''}>Delete</button></td></tr>`;
      }).join('');
    }
    async function add() {
      await PMS.post('/admin/departments', { name: document.getElementById('name').value, code: document.getElementById('code').value });
      bootstrap.Modal.getInstance(document.getElementById('addModal')).hide();
      load();
    }
    const del = id => { if (confirm('Delete?')) PMS.del(`/admin/departments/${id}`).then(load).catch(e => alert(e.message || 'Delete failed')); };
    load();
  </script>
</body>
</html>
