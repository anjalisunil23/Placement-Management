<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analytics — PMS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/frontend/assets/css/style.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body data-pms-fallback="/frontend/pages/admin/dashboard.html">
  <nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="dashboard.html">PMS — Analytics</a>
      <button class="btn btn-outline-light btn-sm" onclick="PMS.logout()">Logout</button>
    </div>
  </nav>
  <div class="container-fluid p-4">
    <h2 class="mb-4">Placement Analytics</h2>
    <div class="row g-4 mb-4">
      <div class="col-md-3"><div class="card stat-card p-3"><div class="text-muted">Placement %</div><div class="stat-value" id="placementPct">—</div></div></div>
      <div class="col-md-3"><div class="card stat-card p-3"><div class="text-muted">Highest Salary (LPA)</div><div class="stat-value" id="highSal">—</div></div></div>
      <div class="col-md-3"><div class="card stat-card p-3"><div class="text-muted">Average Salary</div><div class="stat-value" id="avgSal">—</div></div></div>
      <div class="col-md-3"><div class="card stat-card p-3"><div class="text-muted">Median Salary</div><div class="stat-value" id="medSal">—</div></div></div>
    </div>
    <div class="row">
      <div class="col-md-6"><canvas id="branchChart"></canvas></div>
      <div class="col-md-6"><canvas id="companyChart"></canvas></div>
    </div>
  </div>
  <script src="/frontend/assets/js/api.js"></script>
  <script src="/frontend/assets/js/nav.js"></script>
  <script>
    PMS.requireAuth(['admin', 'placement_officer']);
    PMS.get('/analytics/dashboard').then(res => {
      const d = res.data;
      document.getElementById('placementPct').textContent = d.totals.placementPercentage + '%';
      document.getElementById('highSal').textContent = d.salaryAnalytics.highest;
      document.getElementById('avgSal').textContent = d.salaryAnalytics.average;
      document.getElementById('medSal').textContent = d.salaryAnalytics.median;

      new Chart(document.getElementById('branchChart'), {
        type: 'bar',
        data: {
          labels: d.branchStatistics.map(b => b.code),
          datasets: [
            { label: 'Placed', data: d.branchStatistics.map(b => b.placed), backgroundColor: '#2563eb' },
            { label: 'Total', data: d.branchStatistics.map(b => b.total), backgroundColor: '#94a3b8' }
          ]
        },
        options: { plugins: { title: { display: true, text: 'Branch-wise Placement' } } }
      });

      new Chart(document.getElementById('companyChart'), {
        type: 'doughnut',
        data: {
          labels: d.companyStatistics.slice(0, 8).map(c => c.name),
          datasets: [{ data: d.companyStatistics.slice(0, 8).map(c => c.selected), backgroundColor: ['#1e3a5f','#2563eb','#059669','#d97706','#dc2626','#7c3aed','#0891b2','#be185d'] }]
        },
        options: { plugins: { title: { display: true, text: 'Selections by Company' } } }
      });
    });
  </script>
</body>
</html>
