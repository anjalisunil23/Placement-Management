<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Applications — PMS Company</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/frontend/assets/css/style.css" rel="stylesheet">
</head>
<body data-pms-fallback="/frontend/pages/company/dashboard.html">
  <div class="container p-4">
    <h2>Student Applications</h2>
    <div class="row g-2 mb-3 col-md-10">
      <div class="col-md-2"><input class="form-control" id="minCgpa" placeholder="Min CGPA" type="number" step="0.01"></div>
      <div class="col-md-2"><input class="form-control" id="maxBacklogs" placeholder="Max Backlogs" type="number"></div>
      <div class="col-md-3"><input class="form-control" id="skills" placeholder="Skills (comma sep)"></div>
      <div class="col-md-2"><button class="btn btn-outline-primary w-100" onclick="filterApps()">Filter</button></div>
    </div>
    <div id="filterResults" class="mb-3"></div>
    <table class="table table-pms table-striped mt-3">
      <thead><tr><th>Student ID</th><th>Status</th><th>Actions</th></tr></thead>
      <tbody id="tbl"></tbody>
    </table>
  </div>
  <script src="/frontend/assets/js/api.js"></script>
  <script src="/frontend/assets/js/nav.js"></script>
  <script>
    PMS.requireAuth(['company']);
    async function load() {
      const res = await PMS.get('/company/applications');
      document.getElementById('tbl').innerHTML = res.data.map(a => {
        let actions = '';
        if (['officer_approved','company_review'].includes(a.status)) {
          actions += `<button class="btn btn-sm btn-info" onclick="review('${a._id}')">Review</button> `;
          actions += `<button class="btn btn-sm btn-warning" onclick="shortlist('${a._id}')">Shortlist</button> `;
        }
        if (a.status === 'shortlisted') {
          actions += `<button class="btn btn-sm btn-success" onclick="result('${a._id}','selected')">Select</button> `;
          actions += `<button class="btn btn-sm btn-danger" onclick="result('${a._id}','rejected')">Reject</button>`;
        }
        return `<tr><td>${a.studentId}</td><td><span class="badge bg-primary">${a.status}</span></td><td>${actions || '<small class="text-muted">Awaiting officer approval</small>'}</td></tr>`;
      }).join('') || '<tr><td colspan="3">No applications.</td></tr>';
    }
    async function filterApps() {
      const q = new URLSearchParams({
        minCgpa: document.getElementById('minCgpa').value,
        maxBacklogs: document.getElementById('maxBacklogs').value,
        skills: document.getElementById('skills').value
      });
      const res = await PMS.get('/company/applications/filter?' + q.toString());
      document.getElementById('filterResults').innerHTML = '<h6>Filtered Students (' + res.data.length + ')</h6>' +
        res.data.map(s => `<span class="badge bg-light text-dark me-1">${s.registerNumber} CGPA:${(s.academic||{}).cgpa}</span>`).join('');
    }
    const review = id => PMS.post(`/company/applications/${id}/review`).then(load);
    const shortlist = id => PMS.post(`/company/applications/${id}/shortlist`).then(load).catch(e => alert(e.message));
    const result = (id, status) => PMS.post(`/company/applications/${id}/result`, { status }).then(load).catch(e => alert(e.message));
    load();
  </script>
</body>
</html>
