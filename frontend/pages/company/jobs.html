<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Company Jobs — PMS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/frontend/assets/css/style.css" rel="stylesheet">
</head>
<body data-pms-fallback="/frontend/pages/company/dashboard.html">
  <div class="container p-4">
    <h2>Job Postings</h2>
    <form id="jobForm" class="mb-4 col-md-8" enctype="multipart/form-data">
      <input class="form-control mb-2" name="title" placeholder="Job Title" required>
      <textarea class="form-control mb-2" name="description" placeholder="Description"></textarea>
      <input class="form-control mb-2" name="package" placeholder="Package (e.g. 12 LPA)" required>
      <input class="form-control mb-2" name="location" placeholder="Location" required>
      <input type="number" step="0.01" class="form-control mb-2" name="minCgpa" placeholder="Min CGPA">
      <label class="form-label">Job Description (JD) File</label>
      <input type="file" class="form-control mb-2" name="jd" accept=".pdf,.doc,.docx">
      <button type="submit" class="btn btn-pms">Post Job</button>
    </form>
    <div id="jobsList"></div>
  </div>
  <script src="/frontend/assets/js/api.js"></script>
  <script src="/frontend/assets/js/nav.js"></script>
  <script>
    PMS.requireAuth(['company']);
    async function load() {
      const res = await PMS.get('/company/jobs');
      document.getElementById('jobsList').innerHTML = res.data.map(j => `
        <div class="card p-3 mb-2"><strong>${j.title}</strong> — ${j.package} @ ${j.location}${j.jdFile ? ' <span class="badge bg-info">JD attached</span>' : ''}</div>`).join('');
    }
    document.getElementById('jobForm').addEventListener('submit', async e => {
      e.preventDefault();
      const f = e.target;
      const fd = new FormData();
      fd.append('title', f.title.value);
      fd.append('description', f.description.value);
      fd.append('package', f.package.value);
      fd.append('location', f.location.value);
      fd.append('eligibility', JSON.stringify({ minCgpa: parseFloat(f.minCgpa.value) || 0 }));
      if (f.jd.files[0]) fd.append('jd', f.jd.files[0]);
      await PMS.upload('/company/jobs', fd);
      f.reset();
      load();
    });
    load();
  </script>
</body>
</html>
