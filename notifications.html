<!doctype html><html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Notifications · AJCE Placements</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="css/style.css?v=20260713p" rel="stylesheet"/></head>
<body data-page="notifications.html"><div class="app">
<aside class="sidebar" id="sidebar"></aside><div class="main"><header class="topbar" id="topbar"></header><main class="page">

<div class="page-header">
  <div><h1 class="page-title" id="notifTitle">Notifications Center</h1><p class="page-sub" id="notifSub" hidden></p></div>
  <div class="d-flex gap-2" id="notifActions">
    <button class="btn btn-outline-secondary" id="markAllRead"><i class="bi bi-check2-all me-1"></i>Mark all read</button>
    <button class="btn btn-primary" id="btnNewBroadcast" type="button"><i class="bi bi-megaphone me-1"></i>New broadcast</button>
  </div>
</div>

<div class="card-surface">
  <ul class="nav nav-tabs px-3 pt-2" id="notifTabs">
    <li class="nav-item"><a class="nav-link active" data-bs-toggle="tab" href="#unread">Unread <span class="badge-soft danger ms-1" id="unreadBadge">0</span></a></li>
    <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#read">Read</a></li>
    <li class="nav-item" data-non-student><a class="nav-link" data-bs-toggle="tab" href="#email">News broadcast inbox</a></li>
    <li class="nav-item" data-job-feed><a class="nav-link" data-bs-toggle="tab" href="#jobposts">Job Posts</a></li>
    <li class="nav-item" data-student-only><a class="nav-link" data-bs-toggle="tab" href="#jobposters">Job Posters</a></li>
    <li class="nav-item" data-student-only><a class="nav-link" data-bs-toggle="tab" href="#appupdates">Application Updates</a></li>
  </ul>
  <div class="tab-content p-3 p-md-4">
    <div class="tab-pane fade show active" id="unread"><div id="nlistUnread" class="d-flex flex-column gap-2"></div></div>
    <div class="tab-pane fade" id="read">
      <div class="d-flex flex-wrap gap-2 align-items-center justify-content-between mb-3" id="readToolbar" hidden>
        <div class="form-check mb-0">
          <input class="form-check-input" type="checkbox" id="selectAllRead" />
          <label class="form-check-label small" for="selectAllRead">Select all</label>
        </div>
        <div class="d-flex flex-wrap gap-2">
          <button type="button" class="btn btn-sm btn-outline-danger" id="deleteSelectedRead" disabled>
            <i class="bi bi-trash me-1"></i>Delete selected
          </button>
          <button type="button" class="btn btn-sm btn-danger" id="deleteAllRead">
            <i class="bi bi-trash3 me-1"></i>Delete all
          </button>
        </div>
      </div>
      <div id="nlistRead" class="d-flex flex-column gap-2"></div>
    </div>
    <div class="tab-pane fade" id="jobposters"><div id="nlistJobs" class="d-flex flex-column gap-2"></div></div>
    <div class="tab-pane fade" id="appupdates"><div id="nlistApps" class="d-flex flex-column gap-2"></div></div>
    <div class="tab-pane fade" id="email">
      <div class="table-wrap"><table class="table-modern"><thead><tr><th>Subject</th><th>Audience</th><th>Recipients</th><th>Sent</th><th>Email</th><th>Status</th></tr></thead><tbody id="broadcastRows"></tbody></table></div>
    </div>
    <div class="tab-pane fade" id="jobposts">
      <div class="d-flex flex-wrap gap-2 align-items-center justify-content-between mb-3">
        <h6 class="fw-bold mb-0">Available posts <span class="badge-soft muted ms-1" id="jobFeedCount">0</span></h6>
        <select class="form-select form-select-sm w-auto" id="jobSourceFilter">
          <option value="">All sources</option>
          <option value="company">Company posts</option>
          <option value="alumni">Alumni posts</option>
        </select>
      </div>
      <div id="jobFeedRows"><div class="text-muted-2 text-center p-4">Loading job posts…</div></div>
    </div>
  </div>
</div>

<div class="modal fade" id="broadcastModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content card-surface border-0">
      <div class="modal-header border-0 pb-0">
        <h5 class="modal-title fw-bold">New broadcast</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <form id="broadcastForm" class="modal-body pt-2">
        <p class="small text-muted-2">Send an in-app alert and optional email to the selected audience.</p>
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label small fw-semibold">Audience</label>
            <select class="form-select" id="broadcastAudience" required></select>
          </div>
          <div class="col-md-6 d-none" id="broadcastDeptWrap">
            <label class="form-label small fw-semibold">Department</label>
            <select class="form-select" id="broadcastDepartment"><option value="">All students</option></select>
          </div>
          <div class="col-12">
            <label class="form-label small fw-semibold">Title</label>
            <input class="form-control" id="broadcastTitle" required placeholder="e.g. Google SDE drive registration open"/>
          </div>
          <div class="col-12">
            <label class="form-label small fw-semibold">Message</label>
            <textarea class="form-control" id="broadcastMessage" rows="4" required placeholder="Write the announcement students and staff should see…"></textarea>
          </div>
          <div class="col-12">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="broadcastSendEmail" checked/>
              <label class="form-check-label small" for="broadcastSendEmail">Also send email notification</label>
            </div>
          </div>
        </div>
        <div class="d-flex justify-content-end gap-2 mt-4">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn btn-primary" id="broadcastSubmitBtn"><i class="bi bi-send me-1"></i>Send broadcast</button>
        </div>
      </form>
    </div>
  </div>
</div>

</main></div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js?v=20260716notifdel"></script>
<script src="js/app.js?v=20260716notifdel"></script>
<script>
onAppReady(() => {
const role = Auth.role();
const isStudent = role === 'student';
const isAlumni = role === 'alumni';
const isStaff = role === 'staff';
const isAdminLike = role === 'admin' || role === 'placement_officer';
const isSeekingAlumni = isAlumni && (typeof alumniIsWorking !== 'function' || !alumniIsWorking());
const canViewJobFeed = isAdminLike || isStaff || isStudent || isSeekingAlumni;
const hasInbox = !!NotificationInbox.store(role);
const notifStore = NotificationInbox.store(role);
const notifApiBase = NotificationInbox.apiBase(role);

const pageCopy = {
  student: ['Notifications', ''],
  alumni: ['Notifications', ''],
  staff: ['Notifications', ''],
  admin: ['Notifications Center', ''],
  placement_officer: ['Notifications Center', 'Send department broadcasts and track delivery.'],
  company: ['Notifications', 'Application updates and candidate pipeline alerts.'],
};
const [pageTitle, pageSub] = pageCopy[role] || ['Notifications', 'Your inbox.'];
document.getElementById('notifTitle').textContent = pageTitle;
const notifSubEl = document.getElementById('notifSub');
notifSubEl.textContent = pageSub;
if (!pageSub) notifSubEl.hidden = true;

if (!isAdminLike) {
  document.querySelectorAll('[data-non-student]').forEach(el => el.style.display = 'none');
}
if (!isStudent) {
  document.querySelectorAll('[data-student-only]').forEach(el => el.style.display = 'none');
}
if (!canViewJobFeed) {
  document.querySelectorAll('[data-job-feed]').forEach(el => el.style.display = 'none');
}
if (!isAdminLike) {
  document.getElementById('notifActions').innerHTML =
    '<button class="btn btn-outline-secondary" id="markAllRead"><i class="bi bi-check2-all me-1"></i>Mark all read</button>';
}

function notifIcon(type) {
  const t = String(type || '').toLowerCase();
  if (t === 'placement_rejected') return ['danger', 'bi-x-circle-fill'];
  if (t === 'placement_approved') return ['success', 'bi-check-circle-fill'];
  if (['self_placement_submitted', 'placement_report_submitted'].includes(t)) return ['warning', 'bi-clipboard-check-fill'];
  if (['job_poster', 'job_post', 'drive_announcement', 'broadcast'].includes(t)) return ['primary', 'bi-briefcase-fill'];
  if (['application_update', 'selection_update', 'referral', 'recommendation_update', 'application_submitted', 'registration_approved', 'officer_approved', 'resume_verified'].includes(t)) return ['info', 'bi-send-check-fill'];
  if (['resume_review', 'warning'].includes(t)) return ['warning', 'bi-exclamation-triangle-fill'];
  if (['offer', 'success'].includes(t)) return ['success', 'bi-check-circle-fill'];
  return ['primary', 'bi-bell-fill'];
}

function notifAccent(rawType) {
  const t = String(rawType || '').toLowerCase();
  if (t === 'placement_rejected') return 'var(--danger)';
  if (t === 'placement_approved') return 'var(--success)';
  if (t === 'placement_report_submitted') return 'var(--warning)';
  return 'var(--primary)';
}

function notifCard(n, { selectable = false } = {}) {
  const icon = notifIcon(n.rawType || n.type);
  const accent = notifAccent(n.rawType || n.type);
  const ago = formatDate(n.createdAt);
  const reviewHint = (n.rawType === 'self_placement_submitted' && n.metadata?.studentId)
    ? '<div class="small text-warning mt-1"><i class="bi bi-arrow-right-circle me-1"></i>Click to review placement report</div>' : '';
  const check = selectable
    ? `<div class="me-2 pt-1" onclick="event.stopPropagation()"><input type="checkbox" class="form-check-input notif-select" data-id="${escHtml(n.id)}" aria-label="Select notification"/></div>`
    : '';
  return `<div class="notif-card ${n.read ? '' : 'unread'} d-flex align-items-start gap-2" data-id="${escHtml(n.id)}" role="button" tabindex="0" style="cursor:pointer;border-left:3px solid ${accent}">
    ${check}
    <div class="notif-ic" style="background:color-mix(in srgb,var(--${icon[0]}) 15%,transparent);color:var(--${icon[0]})"><i class="bi ${icon[1]}"></i></div>
    <div class="flex-grow-1"><div class="d-flex justify-content-between"><strong>${escHtml(n.title)}</strong><small class="text-muted-2">${ago}</small></div>
    <p class="mb-0 small text-muted-2">${escHtml(n.body)}</p>${reviewHint}</div>
  </div>`;
}

function mapApiNotifType(type) {
  const t = (type || '').toLowerCase();
  if (t === 'drive_announcement' || t === 'job_poster' || t === 'job_post' || t === 'broadcast') return 'job_poster';
  if (['application_update', 'selection_update', 'application_submitted', 'officer_approved', 'registration_approved', 'referral', 'recommendation_update'].includes(t)) return 'application_update';
  if (t === 'resume_review') return 'resume_review';
  if (t === 'offer') return 'offer';
  return 'general';
}

function normalizeNotif(n) {
  return {
    id: String(n._id || n.id || ''),
    type: n.type === 'job_poster' || n.type === 'application_update' ? n.type : mapApiNotifType(n.type),
    rawType: String(n.type || ''),
    title: n.title || 'Notification',
    body: n.body || n.message || '',
    read: !!n.read,
    createdAt: n.createdAt,
    driveId: n.driveId || n.metadata?.driveId,
    metadata: n.metadata && typeof n.metadata === 'object' ? n.metadata : {},
  };
}

let notificationRows = [];

async function loadNotifications() {
  if (Auth.hasRealAuth() && notifApiBase) {
    await Auth.ensureSession();
    if (isStaff) await Auth.enrichFromProfile();
    const res = await api(notifApiBase, { skipAuthRedirect: true });
    if (res?.success) {
      notificationRows = (res.data || []).map(normalizeNotif);
      NotificationInbox.refreshBadge?.();
      return;
    }
    notificationRows = [];
    NotificationInbox.refreshBadge?.();
    toast(res?.message || 'Could not load live notifications.', 'error');
    return;
  }
  notifStore?.seed();
  notificationRows = (notifStore?.all() || []).map(normalizeNotif);
  NotificationInbox.refreshBadge?.();
}

async function loadBroadcastHistory() {
  if (!isAdminLike) return;
  await BroadcastStore.fetch();
  const rows = BroadcastStore.all();
  document.getElementById('broadcastRows').innerHTML = rows.length ? rows.map(b => `
    <tr>
      <td><strong>${escHtml(b.title)}</strong><div class="small text-muted-2 text-truncate" style="max-width:280px">${escHtml(b.message)}</div></td>
      <td>${escHtml(b.audienceLabel || b.audience)}</td>
      <td>${b.recipientCount ?? 0}</td>
      <td>${b.createdAt ? formatDate(b.createdAt) : '—'}</td>
      <td>${b.sendEmail ? (b.emailSentCount ?? 0) : '—'}</td>
      <td><span class="badge-soft success">${escHtml(b.status || 'Delivered')}</span></td>
    </tr>`).join('') : '<tr><td colspan="6" class="text-muted-2 p-4">No broadcasts sent yet.</td></tr>';
}

function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');
}

let jobFeedRows = [];

function jobFeedEndpoint() {
  return {
    admin: '/admin/jobs',
    placement_officer: '/officer/jobs',
    staff: '/staff/jobs',
    student: '/student/jobs',
    alumni: '/alumni/jobs',
  }[role] || '';
}

function renderJobFeed() {
  const source = document.getElementById('jobSourceFilter')?.value || '';
  const rows = source ? jobFeedRows.filter(row => row.sourceType === source) : jobFeedRows;
  document.getElementById('jobFeedCount').textContent = rows.length;
  document.getElementById('jobFeedRows').innerHTML = rows.length ? `<div class="row g-3">${rows.map(row => {
    const branches = Array.isArray(row.branches) && row.branches.length ? row.branches.join(', ') : 'All departments';
    const eligibility = row.eligibility || {};
    const eligibilityLabel = [
      Number(eligibility.minCgpa || 0) > 0 ? `CGPA ${eligibility.minCgpa}+` : '',
      eligibility.maxBacklogs != null ? `Backlogs ≤ ${eligibility.maxBacklogs}` : '',
    ].filter(Boolean).join(' · ') || 'No additional academic criteria';
    const status = String(row.status || 'open');
    const statusCls = ['open','ongoing'].includes(status) ? 'success' : (status === 'reviewing' ? 'warning' : 'muted');
    const posterUrl = row.posterUrl || row.imageUrl || '';
    const posterType = row.posterType || (row.imageUrl ? 'image' : '');
    return `<div class="col-md-6 col-xl-4"><article class="card-surface h-100 p-3">
      ${posterType === 'image' && posterUrl ? `<img src="${escHtml(posterUrl)}" alt="${escHtml(row.title)} job poster" class="w-100 rounded-3 mb-3" style="height:180px;object-fit:cover" loading="lazy"/>` : ''}
      <div class="d-flex justify-content-between gap-2 mb-2">
        <span class="badge-soft ${row.sourceType === 'company' ? 'info' : 'muted'}">${escHtml(row.sourceLabel)}</span>
        <span class="badge-soft ${statusCls}">${escHtml(status)}</span>
      </div>
      <h6 class="fw-bold mb-1">${escHtml(row.title)}</h6>
      <div class="small text-muted-2 mb-3">${escHtml(row.companyName)}</div>
      <div class="small d-grid gap-1">
        <div><i class="bi bi-briefcase me-2"></i>${escHtml(row.jobType || '—')}</div>
        <div><i class="bi bi-cash-coin me-2"></i>${escHtml(row.package || '—')}</div>
        <div><i class="bi bi-geo-alt me-2"></i>${escHtml(row.location || '—')}</div>
        <div><i class="bi bi-diagram-3 me-2"></i>${escHtml(branches)}</div>
        <div><i class="bi bi-mortarboard me-2"></i>${escHtml(eligibilityLabel)}</div>
      </div>
      ${row.description ? `<p class="small text-muted-2 mt-3 mb-0">${escHtml(row.description)}</p>` : ''}
      ${posterType === 'pdf' && posterUrl ? `<a class="btn btn-sm btn-outline-primary mt-3" href="${escHtml(posterUrl)}" target="_blank" rel="noopener"><i class="bi bi-file-earmark-pdf me-1"></i>View job poster</a>` : ''}
      <div class="small text-muted-2 mt-3">Posted ${escHtml(formatDate(row.createdAt))}</div>
    </article></div>`;
  }).join('')}</div>` : '<div class="text-muted-2 text-center p-4">No related job posts available.</div>';
}

async function loadJobFeed() {
  const endpoint = jobFeedEndpoint();
  if (!canViewJobFeed || !endpoint || !Auth.hasRealAuth()) return;
  const res = await api(endpoint, { noRedirectOn401: true });
  if (!res?.success) {
    jobFeedRows = [];
    renderJobFeed();
    toast(res?.message || 'Could not load job posts.', 'error');
    return;
  }
  jobFeedRows = Array.isArray(res.data) ? res.data : [];
  renderJobFeed();
}

let broadcastModal;
let broadcastDepartments = [];

function audienceOptions() {
  if (role === 'placement_officer') {
    return [{ value: 'students', label: 'Students in my department' }];
  }
  return [
    { value: 'students', label: 'All students' },
    { value: 'staff', label: 'All staff' },
    { value: 'alumni', label: 'All alumni' },
    { value: 'officers', label: 'Placement officers' },
    { value: 'companies', label: 'Company recruiters' },
    { value: 'everyone', label: 'All users' },
  ];
}

function syncBroadcastForm() {
  const audience = document.getElementById('broadcastAudience').value;
  const deptWrap = document.getElementById('broadcastDeptWrap');
  if (role === 'admin') {
    deptWrap.classList.toggle('d-none', audience !== 'students');
  } else {
    deptWrap.classList.add('d-none');
  }
}

async function openBroadcastModal() {
  if (!(await requireWriteSession())) return;
  document.getElementById('broadcastForm').reset();
  document.getElementById('broadcastSendEmail').checked = true;
  const sel = document.getElementById('broadcastAudience');
  sel.innerHTML = audienceOptions().map(o => `<option value="${o.value}">${o.label}</option>`).join('');
  if (role === 'admin') {
    await DepartmentStore.fetch();
    broadcastDepartments = DepartmentStore.all();
    document.getElementById('broadcastDepartment').innerHTML =
      '<option value="">All students</option>' +
      broadcastDepartments.map(d => `<option value="${d.id}">${d.name} (${d.code})</option>`).join('');
  }
  syncBroadcastForm();
  broadcastModal.show();
}

function renderInbox() {
  const all = notificationRows;
  const readRows = all.filter(n => n.read);
  document.getElementById('unreadBadge').textContent = all.filter(n => !n.read).length;
  document.getElementById('nlistUnread').innerHTML = all.filter(n => !n.read).map(n => notifCard(n)).join('') || '<p class="text-muted-2">No unread notifications.</p>';
  const toolbar = document.getElementById('readToolbar');
  if (toolbar) toolbar.hidden = readRows.length === 0;
  document.getElementById('nlistRead').innerHTML = readRows.length
    ? readRows.map(n => notifCard(n, { selectable: true })).join('')
    : '<p class="text-muted-2">No read notifications yet.</p>';
  const selectAll = document.getElementById('selectAllRead');
  if (selectAll) selectAll.checked = false;
  syncReadSelection();
  if (isStudent) {
    document.getElementById('nlistJobs').innerHTML = all.filter(n => n.type === 'job_poster').map(n => notifCard(n)).join('') || '<p class="text-muted-2">No job posters yet.</p>';
    document.getElementById('nlistApps').innerHTML = all.filter(n => n.type === 'application_update').map(n => notifCard(n)).join('') || '<p class="text-muted-2">No application updates yet.</p>';
  }
}

function selectedReadIds() {
  return [...document.querySelectorAll('#nlistRead .notif-select:checked')]
    .map(el => String(el.dataset.id || '').trim())
    .filter(Boolean);
}

function syncReadSelection() {
  const ids = selectedReadIds();
  const btn = document.getElementById('deleteSelectedRead');
  if (btn) btn.disabled = ids.length === 0;
  const boxes = [...document.querySelectorAll('#nlistRead .notif-select')];
  const selectAll = document.getElementById('selectAllRead');
  if (selectAll && boxes.length) {
    selectAll.checked = boxes.every(b => b.checked);
    selectAll.indeterminate = !selectAll.checked && boxes.some(b => b.checked);
  }
}

async function deleteNotificationsByIds(ids) {
  const unique = [...new Set((ids || []).map(String).filter(Boolean))];
  if (!unique.length) return false;
  if (Auth.hasRealAuth() && notifApiBase) {
    const res = await api(`${notifApiBase}/delete-selected`, {
      method: 'POST',
      body: { ids: unique },
      skipAuthRedirect: true,
    });
    if (!res?.success) {
      toast(res?.message || 'Could not delete notifications.', 'error');
      return false;
    }
  } else if (notifStore?.removeMany) {
    notifStore.removeMany(unique);
  } else if (notifStore) {
    unique.forEach(id => notifStore.remove?.(id));
  }
  await loadNotifications();
  renderInbox();
  NotificationInbox.refreshBadge?.();
  return true;
}

async function deleteAllReadNotifications() {
  if (Auth.hasRealAuth() && notifApiBase) {
    const res = await api(`${notifApiBase}/delete-all`, {
      method: 'POST',
      body: { readOnly: true },
      skipAuthRedirect: true,
    });
    if (!res?.success) {
      toast(res?.message || 'Could not delete notifications.', 'error');
      return false;
    }
  } else if (notifStore?.removeRead) {
    notifStore.removeRead();
  } else if (notifStore?.removeMany) {
    notifStore.removeMany(notificationRows.filter(n => n.read).map(n => n.id));
  }
  await loadNotifications();
  renderInbox();
  NotificationInbox.refreshBadge?.();
  return true;
}

function showReadTab() {
  const readTab = document.querySelector('#notifTabs a[href="#read"]');
  if (readTab && typeof bootstrap !== 'undefined') bootstrap.Tab.getOrCreateInstance(readTab).show();
}

async function openNotification(id) {
  const sid = String(id);
  const idx = notificationRows.findIndex(n => String(n.id) === sid);
  if (idx < 0) return;
  const notif = notificationRows[idx];
  const rawType = String(notif.rawType || '').toLowerCase();
  const studentId = notif.metadata?.studentId;

  if (isAdminLike && rawType === 'self_placement_submitted' && studentId) {
    if (!notif.read) {
      if (Auth.hasRealAuth() && notifApiBase) {
        await api(`${notifApiBase}/${encodeURIComponent(sid)}/read`, { method: 'POST', skipAuthRedirect: true });
      } else if (notifStore) {
        notifStore.markRead(sid);
      }
      NotificationInbox.refreshBadge?.();
    }
    const link = notif.metadata?.link || (`students.html?verify=${encodeURIComponent(studentId)}`);
    window.location.href = link;
    return;
  }

  if (notif.read) {
    showReadTab();
    return;
  }

  notificationRows[idx] = { ...notif, read: true };
  renderInbox();
  showReadTab();

  if (Auth.hasRealAuth() && notifApiBase) {
    const res = await api(`${notifApiBase}/${encodeURIComponent(sid)}/read`, { method: 'POST', skipAuthRedirect: true });
    if (!res?.success) {
      notificationRows[idx] = notif;
      renderInbox();
      toast(res?.message || 'Could not mark as read.', 'error');
      return;
    }
    await loadNotifications();
    renderInbox();
    NotificationInbox.refreshBadge?.();
  } else if (notifStore) {
    notifStore.markRead(sid);
    notificationRows = notifStore.all().map(normalizeNotif);
    renderInbox();
  }
  toast('Marked as read.', 'success');
}

function bindNotificationClicks() {
  const listIds = isStudent ? ['nlistUnread', 'nlistRead', 'nlistJobs', 'nlistApps'] : ['nlistUnread', 'nlistRead'];
  listIds.forEach(listId => {
    const el = document.getElementById(listId);
    if (!el || el.dataset.bound === '1') return;
    el.dataset.bound = '1';
    el.addEventListener('click', e => {
      if (e.target.closest('.notif-select')) {
        syncReadSelection();
        return;
      }
      const card = e.target.closest('.notif-card[data-id]');
      if (card) openNotification(card.dataset.id);
    });
    el.addEventListener('change', e => {
      if (e.target.classList.contains('notif-select')) syncReadSelection();
    });
    el.addEventListener('keydown', e => {
      if (e.key !== 'Enter' && e.key !== ' ') return;
      const card = e.target.closest('.notif-card[data-id]');
      if (card) { e.preventDefault(); openNotification(card.dataset.id); }
    });
  });
}

function bindReadDeleteActions() {
  document.getElementById('selectAllRead')?.addEventListener('change', (e) => {
    const checked = !!e.target.checked;
    document.querySelectorAll('#nlistRead .notif-select').forEach(box => { box.checked = checked; });
    syncReadSelection();
  });
  document.getElementById('deleteSelectedRead')?.addEventListener('click', async () => {
    const ids = selectedReadIds();
    if (!ids.length) {
      toast('Select at least one notification.', 'warn');
      return;
    }
    if (!(await confirmAction({
      title: 'Delete selected',
      message: `Delete ${ids.length} selected notification${ids.length === 1 ? '' : 's'}?`,
      confirmText: 'Delete',
      variant: 'danger',
    }))) return;
    if (await deleteNotificationsByIds(ids)) {
      toast(ids.length === 1 ? 'Notification deleted.' : `${ids.length} notifications deleted.`, 'success');
    }
  });
  document.getElementById('deleteAllRead')?.addEventListener('click', async () => {
    const count = notificationRows.filter(n => n.read).length;
    if (!count) {
      toast('No read notifications to delete.', 'warn');
      return;
    }
    if (!(await confirmAction({
      title: 'Delete all read',
      message: `Delete all ${count} read notification${count === 1 ? '' : 's'}? This cannot be undone.`,
      confirmText: 'Delete all',
      variant: 'danger',
    }))) return;
    if (await deleteAllReadNotifications()) {
      toast('All read notifications deleted.', 'success');
    }
  });
}

if (hasInbox) {
  loadNotifications().then(() => {
    renderInbox();
    bindNotificationClicks();
    bindReadDeleteActions();
    if (isAdminLike) loadBroadcastHistory();
  });
  document.getElementById('markAllRead')?.addEventListener('click', async () => {
    if (Auth.hasRealAuth() && notifApiBase) {
      const res = await api(`${notifApiBase}/read-all`, { method: 'POST', skipAuthRedirect: true });
      if (!res?.success) {
        toast(res?.message || 'Could not mark all as read.', 'error');
        return;
      }
    } else if (notifStore) {
      notifStore.markAllRead();
    }
    await loadNotifications();
    renderInbox();
    showReadTab();
    toast('All marked as read.', 'success');
  });
}

if (canViewJobFeed) {
  document.getElementById('jobSourceFilter')?.addEventListener('change', renderJobFeed);
  loadJobFeed();
}

function activateNotifTabFromHash() {
  const hash = String(window.location.hash || '').replace(/^#/, '');
  if (!hash) return;
  const tab = document.querySelector(`#notifTabs a[href="#${CSS.escape(hash)}"]`);
  if (!tab || tab.closest('li')?.style.display === 'none') return;
  if (typeof bootstrap !== 'undefined') {
    bootstrap.Tab.getOrCreateInstance(tab).show();
  } else {
    tab.click();
  }
  if (typeof renderShell === 'function' && typeof shellActivePage === 'function') {
    renderShell(shellActivePage());
  }
}

activateNotifTabFromHash();
window.addEventListener('hashchange', activateNotifTabFromHash);

if (isAdminLike) {
  broadcastModal = new bootstrap.Modal(document.getElementById('broadcastModal'));
  document.getElementById('btnNewBroadcast')?.addEventListener('click', openBroadcastModal);
  document.getElementById('broadcastAudience')?.addEventListener('change', syncBroadcastForm);
  document.getElementById('broadcastForm')?.addEventListener('submit', async e => {
    e.preventDefault();
    if (!(await requireWriteSession())) return;
    const audience = document.getElementById('broadcastAudience').value;
    const payload = {
      title: document.getElementById('broadcastTitle').value.trim(),
      message: document.getElementById('broadcastMessage').value.trim(),
      audience,
      sendEmail: document.getElementById('broadcastSendEmail').checked,
    };
    if (role === 'admin' && audience === 'students') {
      const deptId = document.getElementById('broadcastDepartment').value;
      if (deptId) payload.departmentId = deptId;
    }
    if (!(await confirmAction({
      title: 'Send broadcast',
      message: `Send this notification to ${audience.replace(/_/g, ' ')}?`,
      confirmText: 'Send',
      variant: 'primary',
    }))) return;
    const btn = document.getElementById('broadcastSubmitBtn');
    btn.disabled = true;
    const result = await BroadcastStore.send(payload);
    btn.disabled = false;
    if (!result) return;
    broadcastModal.hide();
    toast(`Broadcast sent to ${result.recipientCount || 0} recipient(s).`, 'success');
    await loadBroadcastHistory();
  });
}
});
</script></body></html>
