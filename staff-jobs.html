<!doctype html><html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Job Posts · AJCE Placements Staff</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="css/style.css?v=20260713p" rel="stylesheet"/></head>
<body data-page="staff-jobs.html"><div class="app">
<aside class="sidebar" id="sidebar"></aside><div class="main"><header class="topbar" id="topbar"></header><main class="page">

<div class="page-header">
  <div>
    <h1 class="page-title">Job Posts</h1>
    <p class="text-muted-2 small mb-0">Posts are for your department. Admin or your department placement officer must approve before they become a drive.</p>
  </div>
  <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#postJob"><i class="bi bi-plus-lg me-1"></i>Post a Job</button>
</div>

<div class="card-surface mb-3 p-3" id="staffDeptBanner">
  <div class="small text-muted-2">Department</div>
  <div class="fw-semibold" id="staffDeptLabel">Loading…</div>
</div>

<div class="card-surface">
  <div class="p-3 p-md-4"><h6 class="fw-bold mb-0">Your job postings <span class="badge-soft muted ms-1" id="jobCountBadge">0</span></h6></div>
  <div class="table-wrap">
    <table class="table-modern"><thead><tr><th>Role</th><th>Company</th><th>Package</th><th>Posted</th><th>Status</th></tr></thead>
    <tbody id="jobRows"></tbody></table>
  </div>
</div>

<div class="modal fade" id="postJob" tabindex="-1"><div class="modal-dialog modal-lg modal-dialog-centered"><div class="modal-content">
  <div class="modal-header"><h5 class="modal-title fw-bold">Post a new job</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
  <form id="postJobForm">
    <div class="modal-body row g-3">
      <div class="col-md-6"><label class="form-label small fw-semibold">Role</label><input class="form-control" name="title" required/></div>
      <div class="col-md-6"><label class="form-label small fw-semibold">Company</label><input class="form-control" name="company" required/></div>
      <div class="col-md-4"><label class="form-label small fw-semibold">Type</label><select class="form-select" name="type"><option>Full-time</option><option>Internship</option><option>Contract</option></select></div>
      <div class="col-md-4"><label class="form-label small fw-semibold">Package (LPA)</label><input class="form-control" name="package"/></div>
      <div class="col-md-4"><label class="form-label small fw-semibold">Location</label><input class="form-control" name="location"/></div>
      <div class="col-12"><label class="form-label small fw-semibold">Job poster (optional)</label><input class="form-control" type="file" name="poster" accept=".jpg,.jpeg,.png,.webp,.pdf,image/jpeg,image/png,image/webp,application/pdf"/><div class="form-text">JPG, PNG, WebP, or PDF · maximum 10 MB</div></div>
      <div class="col-12"><label class="form-label small fw-semibold">Description</label><textarea class="form-control" name="description" rows="4"></textarea></div>
    </div>
    <div class="modal-footer"><button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button><button type="submit" class="btn btn-primary">Submit for approval</button></div>
  </form>
</div></div></div>

</main></div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js?v=20260720jobpost"></script>
<script src="js/app.js?v=20260720jobpost"></script>
<script>
let jobRows = [];

function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');
}

function fmtPackage(pkg) {
  const s = String(pkg ?? '').trim();
  if (!s) return '—';
  if (/₹|LPA/i.test(s)) return s;
  if (/^\d+(\.\d+)?$/.test(s)) return `₹${s} LPA`;
  return s;
}

function normalizeJobPost(j) {
  const st = mapApiJobPostStatus(j.status);
  return {
    id: String(j._id || j.id || ''),
    title: j.title || '',
    company: j.company || '',
    package: fmtPackage(j.package),
    posterUrl: j.posterUrl || j.imageUrl || '',
    posterType: j.posterType || (j.imageUrl ? 'image' : ''),
    createdAt: j.createdAt,
    status: j.status || 'pending',
    statusLabel: st.statusLabel,
    statusCls: st.statusCls,
  };
}

function renderJobs() {
  document.getElementById('jobCountBadge').textContent = String(jobRows.length);
  document.getElementById('jobRows').innerHTML = jobRows.length ? jobRows.map(j => `
    <tr>
      <td><div class="d-flex align-items-center gap-2">${j.posterType === 'image' && j.posterUrl ? `<a href="${j.posterUrl}" target="_blank" rel="noopener"><img src="${j.posterUrl}" alt="" class="rounded-2" style="width:42px;height:42px;object-fit:cover"/></a>` : j.posterType === 'pdf' && j.posterUrl ? `<a href="${j.posterUrl}" target="_blank" rel="noopener" title="View job poster"><i class="bi bi-file-earmark-pdf-fill text-danger fs-4"></i></a>` : ''}<strong>${escHtml(j.title)}</strong></div></td>
      <td>${escHtml(j.company)}</td>
      <td>${escHtml(j.package)}</td>
      <td>${formatDate(j.createdAt)}</td>
      <td><span class="badge-soft ${j.statusCls}">${escHtml(j.statusLabel)}</span></td>
    </tr>`).join('') : '<tr><td colspan="5" class="text-muted-2 p-4">No job posts yet.</td></tr>';
}

async function loadStaffProfile() {
  const res = await api('/staff/profile', { noRedirectOn401: true });
  const code = res?.data?.department || '';
  const name = res?.data?.departmentName || '';
  document.getElementById('staffDeptLabel').textContent = code || name
    ? `${code}${name && name !== code ? ` — ${name}` : ''}`
    : 'Department not set';
}

async function loadJobPosts() {
  const res = await api('/staff/job-posts', { noRedirectOn401: true });
  if (!res?.success) {
    jobRows = [];
    toast(res?.message || 'Could not load job posts.', 'error');
    renderJobs();
    return;
  }
  jobRows = (res.data || []).map(normalizeJobPost);
  renderJobs();
}

onAppReady(async () => {
  await Promise.all([loadStaffProfile(), loadJobPosts()]);
});

document.getElementById('postJobForm').addEventListener('submit', async e => {
  e.preventDefault();
  const formData = new FormData(e.target);
  const data = Object.fromEntries(formData.entries());
  const poster = formData.get('poster');
  if (poster instanceof File && poster.name && (!/\.(jpe?g|png|webp|pdf)$/i.test(poster.name) || poster.size > 10 * 1024 * 1024)) {
    toast('Choose a JPG, PNG, WebP, or PDF poster up to 10 MB.', 'warn');
    return;
  }
  if (!(await confirmAction({ title: 'Submit job post', message: `Submit "${data.title || 'this role'}" for approval?`, confirmText: 'Submit', variant: 'primary' }))) return;
  const res = await api('/staff/job-posts', { method: 'POST', body: formData, noRedirectOn401: true });
  if (!res?.success) {
    toast(res?.message || 'Could not submit job post.', 'error');
    return;
  }
  toast(res.message || 'Job post submitted for approval.', 'success');
  bootstrap.Modal.getInstance(document.getElementById('postJob')).hide();
  e.target.reset();
  await loadJobPosts();
});
</script>
</body></html>
