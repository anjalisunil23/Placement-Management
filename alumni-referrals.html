<!doctype html><html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Referrals · PlaceHub Alumni</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="css/style.css" rel="stylesheet"/></head>
<body data-page="alumni-referrals.html"><div class="app">
<aside class="sidebar" id="sidebar"></aside><div class="main"><header class="topbar" id="topbar"></header><main class="page">

<div class="page-header">
  <div><h1 class="page-title">Referrals</h1><p class="page-sub">Refer students or alumni to roles in your network.</p></div>
</div>

<div class="row g-3">
  <div class="col-lg-5">
    <div class="card-surface p-4">
      <h5 class="fw-bold mb-3">Create a referral</h5>
      <form id="referForm" class="row g-3">
        <div class="col-12"><label class="form-label small fw-semibold">Job title</label><input class="form-control" name="jobTitle" required/></div>
        <div class="col-12"><label class="form-label small fw-semibold">Company</label><input class="form-control" name="companyName" id="refCompany" required/></div>
        <div class="col-12"><label class="form-label small fw-semibold">Company website (optional)</label><input class="form-control" name="companyWebsite" placeholder="https://company.com/careers"/></div>
        <div class="col-md-6"><label class="form-label small fw-semibold">Package</label><input class="form-control" name="package" placeholder="e.g. ₹18 LPA"/></div>
        <div class="col-md-6"><label class="form-label small fw-semibold">Referral type</label><select class="form-select" name="type"><option>Student</option><option>Alumni</option><option>Either</option></select></div>
        <div class="col-12"><label class="form-label small fw-semibold">Description</label><textarea class="form-control" name="description" rows="4" placeholder="Role requirements, team, and referral notes"></textarea></div>
        <div class="col-12"><button type="submit" class="btn btn-primary w-100"><i class="bi bi-share me-1"></i>Submit Referral</button></div>
      </form>
    </div>
  </div>
  <div class="col-lg-7">
    <div class="card-surface">
      <div class="p-3 p-md-4"><h6 class="fw-bold mb-0">My referrals</h6></div>
      <div class="table-wrap">
        <table class="table-modern"><thead><tr><th>Role</th><th>Company</th><th>Website</th><th>Package</th><th>Status</th><th>Date</th></tr></thead>
        <tbody id="referRows"></tbody></table>
      </div>
    </div>
  </div>
</div>

</main></div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script>
const user = Auth.user() || demoUserFor('alumni');
document.getElementById('refCompany').value = user.company || '';

function renderReferrals() {
  const list = AlumniReferrals.mine();
  document.getElementById('referRows').innerHTML = list.length ? list.map(r => `
    <tr>
      <td><strong>${r.jobTitle}</strong></td>
      <td>${r.companyName}</td>
      <td>${r.companyWebsite ? `<a href="${r.companyWebsite}" target="_blank" rel="noopener">${r.companyWebsite.replace(/^https?:\\/\\//,'')}</a>` : '<span class="text-muted-2 small">—</span>'}</td>
      <td>${r.package || '—'}</td>
      <td><span class="badge-soft ${r.statusCls || 'success'}">${r.status || 'Submitted'}</span></td>
      <td>${formatDate(r.submittedAt)}</td>
    </tr>`).join('') : '<tr><td colspan="6" class="text-muted-2 p-4">No referrals yet.</td></tr>';
}

renderReferrals();
document.getElementById('referForm').addEventListener('submit', e => {
  e.preventDefault();
  const data = Object.fromEntries(new FormData(e.target).entries());
  AlumniReferrals.add(data);
  toast('Referral submitted successfully.', 'success');
  e.target.reset();
  document.getElementById('refCompany').value = user.company || '';
  renderReferrals();
});
</script>
</body></html>
