<!doctype html><html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Referrals · PlaceHub Alumni</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="css/style.css" rel="stylesheet"/></head>
<body data-page="alumni-referrals.html"><div class="app">
<aside class="sidebar" id="sidebar"></aside><div class="main"><header class="topbar" id="topbar"></header><main class="page">

<div class="page-header">
  <div>
    <h1 class="page-title">Referrals</h1>
    <p class="page-sub">Refer students or alumni to roles in your network.</p>
  </div>
  <div class="d-flex gap-2">
    <button type="button" class="btn btn-primary" onclick="ReferralModals.openAlumni()"><i class="bi bi-plus-lg me-1"></i>Create Referral</button>
  </div>
</div>

<div class="card-surface">
  <div class="p-3 p-md-4"><h6 class="fw-bold mb-0">My referrals</h6></div>
  <div class="table-wrap">
    <table class="table-modern">
      <thead><tr><th>Role</th><th>Company</th><th>Website</th><th>Package</th><th>Status</th><th>Date</th></tr></thead>
      <tbody id="referRows"></tbody>
    </table>
  </div>
</div>

</main></div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script>
function renderReferrals() {
  const list = AlumniReferrals.mine();
  document.getElementById('referRows').innerHTML = list.length ? list.map(r => `
    <tr>
      <td><strong>${r.jobTitle}</strong></td>
      <td>${r.companyName}</td>
      <td>${r.companyWebsite ? `<a href="${r.companyWebsite}" target="_blank" rel="noopener">${r.companyWebsite.replace(/^https?:\\/\\//,'')}</a>` : '<span class="text-muted-2 small">—</span>'}</td>
      <td>${r.package || '—'}</td>
      <td><span class="badge-soft ${r.statusCls || 'success'}">${r.status || 'Submitted'}</span></td>
      <td>${formatDate(r.submittedAt)}</td>
    </tr>`).join('') : '<tr><td colspan="6" class="text-muted-2 p-4">No referrals yet. <button type="button" class="btn btn-link btn-sm p-0 align-baseline" onclick="ReferralModals.openAlumni()">Create your first referral</button></td></tr>';
}

onAppReady(() => renderReferrals());
document.addEventListener('ph-alumni-referral-added', () => renderReferrals());
</script>
</body></html>
