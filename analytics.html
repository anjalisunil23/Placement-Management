<!doctype html><html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Analytics · PlaceHub</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="css/style.css" rel="stylesheet"/></head>
<body data-page="analytics.html"><div class="app">
<aside class="sidebar" id="sidebar"></aside><div class="main"><header class="topbar" id="topbar"></header><main class="page">

<div class="page-header">
  <div><h1 class="page-title">Analytics Dashboard</h1><p class="page-sub">Deep insights across drives, branches and packages.</p></div>
  <select class="form-select w-auto" id="seasonSelect" disabled><option>Current season</option></select>
</div>

<div id="analyticsAlert" class="alert alert-info d-flex align-items-center gap-2 d-none"></div>

<div class="row g-3" id="analyticsCharts">
  <div class="col-lg-8"><div class="card-surface p-3 p-md-4"><h6 class="fw-bold">Hiring trend (12 months)</h6><div style="height:320px"><canvas id="c1"></canvas></div></div></div>
  <div class="col-lg-4"><div class="card-surface p-3 p-md-4"><h6 class="fw-bold">Branch placement (bar chart)</h6><div style="height:320px"><canvas id="c2"></canvas></div></div></div>
  <div class="col-lg-6"><div class="card-surface p-3 p-md-4"><h6 class="fw-bold">Package bands</h6><div style="height:280px"><canvas id="c3"></canvas></div></div></div>
  <div class="col-lg-6"><div class="card-surface p-3 p-md-4"><h6 class="fw-bold">Job type split</h6><div style="height:280px"><canvas id="c4"></canvas></div></div></div>
  <div class="col-12"><div class="card-surface p-3 p-md-4"><h6 class="fw-bold">Offers by top companies</h6><div style="height:300px"><canvas id="c5"></canvas></div></div></div>
</div>

</main></div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script src="js/api.js?v=20260622c"></script>
<script src="js/app.js?v=20260622c"></script><script src="js/charts.js?v=20260622c"></script>
<script>
function renderAnalyticsCharts(data) {
  const trend = data.hiringTrend || {};
  const series = trend.series || [{ label: 'Offers', data: [] }];
  destroyChart(document.getElementById('c1'));
  Charts.line(document.getElementById('c1'), trend.labels || [], series);

  const branch = data.branchPlacement || {};
  destroyChart(document.getElementById('c2'));
  Charts.bar(document.getElementById('c2'), branch.labels || [], branch.values || [], 'Students placed');

  const bands = data.packageBands || {};
  destroyChart(document.getElementById('c3'));
  Charts.bar(document.getElementById('c3'), bands.labels || [], bands.values || [], 'LPA');

  const types = data.jobTypeSplit || {};
  destroyChart(document.getElementById('c4'));
  Charts.pie(document.getElementById('c4'), types.labels || [], types.values || []);

  const top = data.topCompanyOffers || {};
  destroyChart(document.getElementById('c5'));
  Charts.bar(document.getElementById('c5'), top.labels || [], top.values || [], 'Offers');
}

function renderDemoAnalytics() {
  const m = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  renderAnalyticsCharts({
    hiringTrend: { labels: m, series: [{ label: 'Offers', data: [42,58,71,90,120,165,210,245,210,180,150,130] }] },
    branchPlacement: {
      labels: DEPARTMENT_PLACEMENT.map(d => d.dept),
      values: DEPARTMENT_PLACEMENT.map(d => d.placed),
    },
    packageBands: { labels: ['3-6','6-10','10-20','20-40','40+'], values: [820,640,320,140,28] },
    jobTypeSplit: { labels: ['Full-time','Internship','Intern+PPO'], values: [1640,620,280] },
    topCompanyOffers: {
      labels: ['TCS','Infosys','Wipro','Deloitte','Amazon','Google','Microsoft','Adobe','Flipkart','Goldman'],
      values: [210,180,160,95,42,28,35,52,68,24],
    },
  });
}

onAppReady(async () => {
  showPageAlert('analyticsAlert', 'info', 'Loading analytics…');
  try {
    const data = await AnalyticsStore.fetchExtended();
    if (data) {
      showPageAlert('analyticsAlert', 'hide');
      renderAnalyticsCharts(data);
    } else {
      showPageAlert('analyticsAlert', 'hide');
      renderDemoAnalytics();
      if (Auth.hasRealAuth()) toast('Using demo analytics — API unavailable.', 'warn');
    }
  } catch (e) {
    showPageAlert('analyticsAlert', 'danger', 'Failed to load analytics. Showing demo charts.');
    renderDemoAnalytics();
  }
});
</script></body></html>
