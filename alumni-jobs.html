<!doctype html><html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Job Posts · AJCE Placements Alumni</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="css/style.css?v=20260713p" rel="stylesheet"/></head>
<body data-page="alumni-jobs.html"><div class="app">
<aside class="sidebar" id="sidebar"></aside><div class="main"><header class="topbar" id="topbar"></header><main class="page">

<div class="page-header">
  <div>
    <h1 class="page-title">Job Posts</h1>
    <p class="text-muted-2 small mb-0">Posts are reviewed by admin or the department placement officer, then published as a drive.</p>
  </div>
  <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#postJob"><i class="bi bi-plus-lg me-1"></i>Post a Job</button>
</div>

<div class="card-surface">
  <div class="p-3 p-md-4"><h6 class="fw-bold mb-0">Your job postings <span class="badge-soft muted ms-1" id="jobCountBadge">0</span></h6></div>
  <div class="p-3 pt-0" id="jobRows"></div>
</div>

<div class="modal fade" id="postJob" tabindex="-1"><div class="modal-dialog modal-lg modal-dialog-centered"><div class="modal-content">
  <div class="modal-header"><h5 class="modal-title fw-bold">Post a new job</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
  <form id="postJobForm">
    <div class="modal-body row g-3">
      <div class="col-md-6"><label class="form-label small fw-semibold">Role</label><input class="form-control" name="title" required/></div>
      <div class="col-md-6"><label class="form-label small fw-semibold">Company</label><input class="form-control" name="company" id="jobCompany" required/></div>
      <div class="col-md-4"><label class="form-label small fw-semibold">Type</label><select class="form-select" name="type"><option>Full-time</option><option>Internship</option><option>Contract</option></select></div>
      <div class="col-md-4"><label class="form-label small fw-semibold">Package (LPA)</label><input class="form-control" name="package"/></div>
      <div class="col-md-4"><label class="form-label small fw-semibold">Location</label><input class="form-control" name="location"/></div>
      <div class="col-md-6">
        <label class="form-label small fw-semibold">Department</label>
        <select class="form-select" name="departmentId" id="jobDepartment" required>
          <option value="">Select department</option>
        </select>
        <div class="form-text">One department only. That department’s placement officer (or admin) will approve.</div>
      </div>
      <div class="col-md-6"><label class="form-label small fw-semibold">Visible to</label><select class="form-select" name="audience"><option value="student">Students only</option><option value="both">Students and job-seeking alumni</option><option value="alumni">Job-seeking alumni only</option></select></div>
      <div class="col-12"><label class="form-label small fw-semibold">Job poster (optional)</label><input class="form-control" type="file" name="poster" accept=".jpg,.jpeg,.png,.webp,.pdf,image/jpeg,image/png,image/webp,application/pdf"/><div class="form-text">JPG, PNG, WebP, or PDF · maximum 10 MB</div></div>
      <div class="col-12"><label class="form-label small fw-semibold">Description</label><textarea class="form-control" name="description" rows="4"></textarea></div>
    </div>
    <div class="modal-footer"><button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button><button type="submit" class="btn btn-primary">Submit for approval</button></div>
  </form>
</div></div></div>

</main></div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js?v=20260720jobcards"></script>
<script src="js/app.js?v=20260720jobcards"></script>
<script>
const user = Auth.user() || demoUserFor('alumni');
document.getElementById('jobCompany').value = user.company || '';

let jobRows = [];
let jobsUseApi = false;
const deptById = {};

function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;');
}

function fmtAlumniPackage(pkg) {
  const s = String(pkg ?? '').trim();
  if (!s) return '—';
  if (/₹|LPA/i.test(s)) return s;
  if (/^\d+(\.\d+)?$/.test(s)) return `₹${s} LPA`;
  return s;
}

function countActiveJobPosts(rows) {
  return rows.filter(j => ['pending', 'open', 'reviewing'].includes(String(j.status || '').toLowerCase())).length;
}

function statsFromJobRows(rows) {
  return {
    activePosts: countActiveJobPosts(rows),
    totalPosts: rows.length,
    viewsThisMonth: rows.reduce((sum, j) => sum + (Number(j.views) || 0), 0),
    referralsCount: 0,
  };
}

function deptLabel(j) {
  const id = String(j.departmentId || '');
  const dept = deptById[id];
  if (dept) return dept.code ? `${dept.code}` : (dept.name || '—');
  const elig = j.eligibility || {};
  const branches = Array.isArray(elig.branches) ? elig.branches : [];
  return branches[0] || '—';
}

function normalizeJobPost(j) {
  const st = mapApiJobPostStatus(j.status);
  return {
    id: String(j._id || j.id || ''),
    title: j.title || '',
    company: j.company || '',
    departmentId: j.departmentId || '',
    departmentLabel: deptLabel(j),
    package: fmtAlumniPackage(j.package),
    imageUrl: j.imageUrl || '',
    posterUrl: j.posterUrl || j.imageUrl || '',
    posterType: j.posterType || (j.imageUrl ? 'image' : ''),
    views: Number(j.views) || 0,
    createdAt: j.createdAt,
    status: j.status || 'pending',
    statusLabel: j.statusLabel || st.statusLabel,
    statusCls: j.statusCls || st.statusCls,
    eligibility: j.eligibility || {},
  };
}

function renderStats(stats) {
  const total = stats.totalPosts ?? jobRows.length;
  const badge = document.getElementById('jobCountBadge');
  if (badge) badge.textContent = String(total);
}

function renderJobs() {
  document.getElementById('jobRows').innerHTML = jobRows.length
    ? `<div class="row g-3">${jobRows.map(j => `
      <div class="col-md-6 col-xl-4">
        <article class="card-surface h-100 p-3 d-flex flex-column border">
          ${j.posterType === 'image' && j.posterUrl
            ? `<a href="${escHtml(j.posterUrl)}" target="_blank" rel="noopener"><img src="${escHtml(j.posterUrl)}" alt="" class="w-100 rounded-3 mb-3" style="height:160px;object-fit:cover"/></a>`
            : (j.posterType === 'pdf' && j.posterUrl
              ? `<a class="btn btn-sm btn-outline-primary mb-3 align-self-start" href="${escHtml(j.posterUrl)}" target="_blank" rel="noopener"><i class="bi bi-file-earmark-pdf me-1"></i>View poster</a>`
              : '')}
          <div class="d-flex justify-content-between gap-2 mb-2">
            <span class="badge-soft muted">Alumni</span>
            <span class="badge-soft ${j.statusCls}">${escHtml(j.statusLabel)}</span>
          </div>
          <h6 class="fw-bold mb-1">${escHtml(j.title)}</h6>
          <div class="small text-muted-2 mb-3">${escHtml(j.company)}</div>
          <div class="small d-grid gap-1 mt-auto">
            <div><i class="bi bi-diagram-3 me-2"></i>${escHtml(j.departmentLabel || '—')}</div>
            <div><i class="bi bi-cash-coin me-2"></i>${escHtml(j.package || '—')}</div>
            <div class="text-muted-2"><i class="bi bi-calendar3 me-2"></i>Posted ${escHtml(formatDate(j.createdAt))}</div>
          </div>
        </article>
      </div>`).join('')}</div>`
    : '<div class="text-muted-2 text-center p-4">No job posts yet.</div>';
}

async function loadDepartments() {
  const sel = document.getElementById('jobDepartment');
  const res = await api('/public/departments', { noRedirectOn401: true });
  const rows = res?.success && Array.isArray(res.data) ? res.data : [];
  rows.forEach(d => { deptById[String(d.id || d._id || '')] = d; });
  sel.innerHTML = '<option value="">Select department</option>' + rows.map(d =>
    `<option value="${escHtml(String(d.id || ''))}">${escHtml(d.code || '')} — ${escHtml(d.name || '')}</option>`
  ).join('');
}

async function loadJobPosts() {
  jobsUseApi = Auth.hasRealAuth();
  if (jobsUseApi) {
    const [dashRes, listRes] = await Promise.all([
      api('/alumni/dashboard', { noRedirectOn401: true }),
      api('/alumni/job-posts', { noRedirectOn401: true }),
    ]);
    if (listRes?.success) {
      jobRows = (listRes.data || []).map(normalizeJobPost);
    }
    if (listRes?.success || dashRes?.success) {
      const stats = {
        ...statsFromJobRows(jobRows),
        ...(dashRes?.success ? dashRes.data : {}),
        totalPosts: jobRows.length,
        activePosts: dashRes?.success
          ? (dashRes.data?.activePosts ?? countActiveJobPosts(jobRows))
          : countActiveJobPosts(jobRows),
      };
      renderStats(stats);
      return;
    }
    jobsUseApi = false;
  }
  jobRows = AlumniJobPosts.mine().map(normalizeJobPost);
  renderStats({ ...AlumniJobPosts.stats(), totalPosts: jobRows.length });
}

onAppReady(async () => {
  await loadDepartments();
  await loadJobPosts();
  renderJobs();
});

document.getElementById('postJobForm').addEventListener('submit', async e => {
  e.preventDefault();
  const formData = new FormData(e.target);
  const data = Object.fromEntries(formData.entries());
  if (!data.departmentId) {
    toast('Select a department for this job post.', 'warn');
    return;
  }
  const poster = formData.get('poster');
  if (poster instanceof File && poster.name && (!/\.(jpe?g|png|webp|pdf)$/i.test(poster.name) || poster.size > 10 * 1024 * 1024)) {
    toast('Choose a JPG, PNG, WebP, or PDF poster up to 10 MB.', 'warn');
    return;
  }
  if (!(await confirmAction({ title: 'Submit job post', message: `Submit "${data.title || 'this role'}" for approval?`, confirmText: 'Submit', variant: 'primary' }))) return;
  if (jobsUseApi) {
    const res = await api('/alumni/job-posts', { method: 'POST', body: formData, noRedirectOn401: true });
    if (res?.success) {
      toast(res.message || 'Job post submitted for approval.', 'success');
      bootstrap.Modal.getInstance(document.getElementById('postJob')).hide();
      e.target.reset();
      document.getElementById('jobCompany').value = user.company || '';
      await loadJobPosts();
      renderJobs();
      return;
    }
    toast(res?.message || 'Could not submit job post.', 'error');
    return;
  }
  AlumniJobPosts.add({ ...data, status: 'pending' });
  toast('Job post submitted for approval.', 'success');
  bootstrap.Modal.getInstance(document.getElementById('postJob')).hide();
  e.target.reset();
  document.getElementById('jobCompany').value = user.company || '';
  await loadJobPosts();
  renderJobs();
});
</script>
</body></html>
