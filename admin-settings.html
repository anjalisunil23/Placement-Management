<!doctype html><html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>System Settings · PlaceHub</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="css/style.css" rel="stylesheet"/></head>
<body data-page="admin-settings.html"><div class="app">
<aside class="sidebar" id="sidebar"></aside><div class="main"><header class="topbar" id="topbar"></header><main class="page">

<div class="page-header">
  <div><h1 class="page-title">System Settings</h1><p class="page-sub">Configure placement season, email delivery, uploads, and public portal statistics.</p></div>
</div>

<div class="row g-3">
  <div class="col-lg-6">
    <div class="card-surface p-4">
      <div class="d-flex align-items-center justify-content-between mb-3">
        <h5 class="fw-bold mb-0">System configuration</h5>
        <button class="btn btn-primary btn-sm" id="btnSaveSys"><i class="bi bi-check2-lg me-1"></i>Save</button>
      </div>
      <form id="sysForm" class="row g-3">
        <div class="col-md-6">
          <label class="form-label small fw-semibold">Placement year</label>
          <input class="form-control" id="placementYear" placeholder="e.g. 2025-26" required/>
        </div>
        <div class="col-md-6">
          <label class="form-label small fw-semibold">Email from address</label>
          <input type="email" class="form-control" id="emailFrom" placeholder="placement@college.edu" required/>
        </div>
        <div class="col-md-6">
          <label class="form-label small fw-semibold">Max upload size (MB)</label>
          <input type="number" class="form-control" id="maxUploadMb" min="1" max="100" required/>
        </div>
      </form>
    </div>
  </div>
  <div class="col-lg-6">
    <div class="card-surface p-4">
      <div class="d-flex align-items-center justify-content-between mb-3">
        <h5 class="fw-bold mb-0">Public page statistics</h5>
        <button class="btn btn-primary btn-sm" id="btnSavePublic"><i class="bi bi-check2-lg me-1"></i>Save</button>
      </div>
      <form id="publicForm" class="row g-3">
        <div class="col-md-6">
          <label class="form-label small fw-semibold">Students placed</label>
          <input type="number" class="form-control" id="placed" min="0" required/>
        </div>
        <div class="col-md-6">
          <label class="form-label small fw-semibold">Companies count</label>
          <input type="number" class="form-control" id="companies" min="0" required/>
        </div>
        <div class="col-md-6">
          <label class="form-label small fw-semibold">Highest package (LPA)</label>
          <input type="number" class="form-control" id="highestPkg" step="0.1" min="0" required/>
        </div>
        <div class="col-md-6">
          <label class="form-label small fw-semibold">Average package (LPA)</label>
          <input type="number" class="form-control" id="avgPkg" step="0.1" min="0" required/>
        </div>
        <div class="col-md-6">
          <label class="form-label small fw-semibold">Median package (LPA)</label>
          <input type="number" class="form-control" id="medianPkg" step="0.1" min="0" required/>
        </div>
        <div class="col-md-6">
          <label class="form-label small fw-semibold">Lowest package (LPA)</label>
          <input type="number" class="form-control" id="lowestPkg" step="0.1" min="0" required/>
        </div>
        <div class="col-12">
          <label class="form-label small fw-semibold">Achievements text</label>
          <textarea class="form-control" id="achievements" rows="3" placeholder="Highlights shown on the public portal…"></textarea>
        </div>
      </form>
    </div>
  </div>
</div>

<div class="card-surface p-4 mt-3">
  <div class="d-flex align-items-center justify-content-between mb-3 flex-wrap gap-2">
    <div>
      <h5 class="fw-bold mb-0">Placement news</h5>
      <p class="small text-muted-2 mb-0">Add updates shown in the Placement news section on the public landing page.</p>
    </div>
    <button class="btn btn-primary btn-sm" id="btnAddNews"><i class="bi bi-plus-lg me-1"></i>Add news</button>
  </div>
  <div class="table-wrap">
    <table class="table-modern"><thead><tr><th>Date</th><th>Title</th><th>Summary</th><th>Actions</th></tr></thead>
    <tbody id="newsRows"></tbody></table>
  </div>
</div>

<div class="modal fade" id="newsModal" tabindex="-1"><div class="modal-dialog modal-dialog-centered"><div class="modal-content">
  <div class="modal-header"><h5 class="modal-title fw-bold" id="newsModalTitle">Add placement news</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
  <form id="newsForm">
    <input type="hidden" id="newsId"/>
    <div class="modal-body row g-3">
      <div class="col-12"><label class="form-label small fw-semibold">Headline</label><input class="form-control" id="newsTitle" required placeholder="e.g. Google announces 28 SDE offers"/></div>
      <div class="col-12"><label class="form-label small fw-semibold">Summary</label><textarea class="form-control" id="newsSummary" rows="3" required placeholder="Short description shown on the landing page…"></textarea></div>
      <div class="col-md-6"><label class="form-label small fw-semibold">Date</label><input type="date" class="form-control" id="newsDate" required/></div>
      <div class="col-md-6"><label class="form-label small fw-semibold">Link (optional)</label><input type="url" class="form-control" id="newsLink" placeholder="https://…"/></div>
    </div>
    <div class="modal-footer"><button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button><button type="submit" class="btn btn-primary">Save</button></div>
  </form>
</div></div></div>

</main></div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/admin-api.js?v=20260620a"></script>
<script src="js/api.js?v=20260620a"></script>
<script src="js/app.js?v=20260620a"></script>
<script>
function loadSystem() {
  const s = SystemSettings.get();
  document.getElementById('placementYear').value = s.placementYear || '';
  document.getElementById('emailFrom').value = s.emailFrom || '';
  document.getElementById('maxUploadMb').value = s.maxUploadMb ?? 10;
}

function loadPublic() {
  const p = PublicPageContent.get();
  document.getElementById('placed').value = p.placed ?? 0;
  document.getElementById('companies').value = p.companies ?? 0;
  document.getElementById('highestPkg').value = p.highestPkg ?? 0;
  document.getElementById('avgPkg').value = p.avgPkg ?? 0;
  document.getElementById('medianPkg').value = p.medianPkg ?? 0;
  document.getElementById('lowestPkg').value = p.lowestPkg ?? 0;
  document.getElementById('achievements').value = p.achievements || '';
}

document.getElementById('btnSaveSys').addEventListener('click', async () => {
  const result = await SystemSettings.save({
    placementYear: document.getElementById('placementYear').value.trim(),
    emailFrom: document.getElementById('emailFrom').value.trim(),
    maxUploadMb: parseInt(document.getElementById('maxUploadMb').value, 10) || 10,
  });
  toast(result.ok ? 'System settings saved.' : (result.message || 'Saved locally (API unavailable).'), result.ok ? 'success' : 'warn');
});

document.getElementById('btnSavePublic').addEventListener('click', async () => {
  const result = await PublicPageContent.save({
    placed: parseInt(document.getElementById('placed').value, 10) || 0,
    companies: parseInt(document.getElementById('companies').value, 10) || 0,
    highestPkg: parseFloat(document.getElementById('highestPkg').value) || 0,
    avgPkg: parseFloat(document.getElementById('avgPkg').value) || 0,
    medianPkg: parseFloat(document.getElementById('medianPkg').value) || 0,
    lowestPkg: parseFloat(document.getElementById('lowestPkg').value) || 0,
    achievements: document.getElementById('achievements').value.trim(),
    season: SystemSettings.get().placementYear || PublicPageContent.get().season,
  });
  toast(result.ok ? 'Public page content saved.' : (result.message || 'Saved locally (API unavailable).'), result.ok ? 'success' : 'warn');
});

document.getElementById('sysForm').addEventListener('submit', e => { e.preventDefault(); document.getElementById('btnSaveSys').click(); });
document.getElementById('publicForm').addEventListener('submit', e => { e.preventDefault(); document.getElementById('btnSavePublic').click(); });

const newsModal = () => bootstrap.Modal.getInstance(document.getElementById('newsModal')) || new bootstrap.Modal(document.getElementById('newsModal'));
let editingNewsId = null;

function escHtml(s) {
  return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/"/g, '&quot;');
}

function renderNewsAdmin() {
  const list = PlacementNewsStore.published();
  document.getElementById('newsRows').innerHTML = list.length ? list.map(n => `
    <tr>
      <td class="text-nowrap">${escHtml(formatNewsDate(n.date))}</td>
      <td><strong>${escHtml(n.title)}</strong></td>
      <td class="small text-muted-2">${escHtml(n.summary)}</td>
      <td>
        <div class="d-flex gap-1">
          <button class="btn btn-sm btn-outline-primary" type="button" data-edit-news="${n.id}"><i class="bi bi-pencil"></i></button>
          <button class="btn btn-sm btn-outline-danger" type="button" data-remove-news="${n.id}"><i class="bi bi-trash"></i></button>
        </div>
      </td>
    </tr>`).join('') : '<tr><td colspan="4" class="text-muted-2 p-4">No placement news yet. Add one to show on the landing page.</td></tr>';
}

function openAddNews() {
  editingNewsId = null;
  document.getElementById('newsModalTitle').textContent = 'Add placement news';
  document.getElementById('newsId').value = '';
  document.getElementById('newsTitle').value = '';
  document.getElementById('newsSummary').value = '';
  document.getElementById('newsDate').value = new Date().toISOString().slice(0, 10);
  document.getElementById('newsLink').value = '';
  newsModal().show();
}

function openEditNews(id) {
  const n = PlacementNewsStore.all().find(x => x.id === id);
  if (!n) return;
  editingNewsId = id;
  document.getElementById('newsModalTitle').textContent = 'Edit placement news';
  document.getElementById('newsId').value = id;
  document.getElementById('newsTitle').value = n.title || '';
  document.getElementById('newsSummary').value = n.summary || '';
  document.getElementById('newsDate').value = (n.date || '').slice(0, 10);
  document.getElementById('newsLink').value = n.link || '';
  newsModal().show();
}

function removeNews(id) {
  const n = PlacementNewsStore.all().find(x => x.id === id);
  if (!n) return;
  if (!confirm(`Remove news "${n.title}"?`)) return;
  PlacementNewsStore.remove(id).then(ok => {
    toast(ok ? 'Placement news removed.' : 'Removed locally (API unavailable).', ok ? 'success' : 'warn');
    renderNewsAdmin();
  });
}

document.getElementById('btnAddNews').addEventListener('click', openAddNews);

document.getElementById('newsForm').addEventListener('submit', e => {
  e.preventDefault();
  const title = document.getElementById('newsTitle').value.trim();
  const summary = document.getElementById('newsSummary').value.trim();
  const date = document.getElementById('newsDate').value;
  const link = document.getElementById('newsLink').value.trim();
  if (!title || !summary || !date) return;
  const payload = { title, summary, date, link };
  const action = editingNewsId
    ? PlacementNewsStore.update(editingNewsId, payload).then(ok => ({ ok, edit: true }))
    : PlacementNewsStore.add(payload).then(() => ({ ok: true, edit: false }));
  action.then(result => {
    toast(
      result.ok
        ? (result.edit ? 'Placement news updated.' : 'Placement news added.')
        : 'Saved locally (API unavailable).',
      result.ok ? 'success' : 'warn'
    );
    newsModal().hide();
    renderNewsAdmin();
  });
});

document.getElementById('newsRows').addEventListener('click', e => {
  const editBtn = e.target.closest('[data-edit-news]');
  const removeBtn = e.target.closest('[data-remove-news]');
  if (editBtn) openEditNews(editBtn.dataset.editNews);
  if (removeBtn) removeNews(removeBtn.dataset.removeNews);
});

async function initSettingsPage() {
  await Promise.all([
    SystemSettings.fetch(),
    PublicPageContent.fetch(),
    PlacementNewsStore.fetch(),
  ]);
  loadSystem();
  loadPublic();
  renderNewsAdmin();
}

onAppReady(() => initSettingsPage());
</script></body></html>
