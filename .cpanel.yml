---
# cPanel Git Version Control → "Deploy HEAD Commit" runs these tasks.
# Pull/update alone only changes ~/repositories/... — NOT public_html.
deployment:
  tasks:
    - export DEPLOYPATH=/home/placementsajce/public_html
    - export REPOPATH=$(pwd)
    # Sync app files into the live web root (overwrite stale copies)
    - /bin/rm -rf $DEPLOYPATH/backend
    - /bin/cp -Rf backend $DEPLOYPATH/backend
    - /bin/cp -Rf css $DEPLOYPATH/css
    # Force-replace JS (cp -Rf alone can leave stale app.js on some hosts)
    - /bin/mkdir -p $DEPLOYPATH/js
    - /bin/rm -rf $DEPLOYPATH/js
    - /bin/cp -Rf js $DEPLOYPATH/js
    - /bin/cp -f js/*.js $DEPLOYPATH/js/
    - /bin/cp -f .htaccess $DEPLOYPATH/.htaccess
    - /bin/cp -f index.php $DEPLOYPATH/index.php
    - /bin/cp -f backend/bootstrap-aes.php $DEPLOYPATH/backend/bootstrap-aes.php
    - /bin/cp -f callback.php $DEPLOYPATH/callback.php
    - /bin/cp -f aes-callback.php $DEPLOYPATH/aes-callback.php
    - /bin/cp -f composer.json $DEPLOYPATH/composer.json
    - /bin/cp -f composer.lock $DEPLOYPATH/composer.lock
    - /bin/cp -f .env.production.example $DEPLOYPATH/.env.production.example
    - /bin/cp -f *.html $DEPLOYPATH/
    - /bin/git rev-parse HEAD > $DEPLOYPATH/deploy-version.txt
    - /bin/date -u +"%Y-%m-%dT%H:%M:%SZ" >> $DEPLOYPATH/deploy-version.txt
    - /bin/head -n 1 js/app.js >> $DEPLOYPATH/deploy-version.txt
    - /bin/grep -q "APP_SHELL_VERSION" $DEPLOYPATH/js/app.js || (echo "DEPLOY FAILED - js/app.js not updated. Check file permissions on public_html/js/" >&2; exit 1)
    - /bin/grep -q "Placement policy not accepted" $DEPLOYPATH/backend/services/EligibilityEngine.php && (echo "DEPLOY FAILED - backend/services/EligibilityEngine.php is stale (still requires policy). Re-deploy from latest main." >&2; exit 1) || true
    - /bin/mkdir -p $DEPLOYPATH/uploads/resumes $DEPLOYPATH/uploads/reports $DEPLOYPATH/uploads/jd $DEPLOYPATH/uploads/signed_reports $DEPLOYPATH/uploads/photos
    - /bin/chmod -R 775 $DEPLOYPATH/uploads
    - cd $DEPLOYPATH && (/usr/local/bin/composer install --no-dev --optimize-autoloader || /opt/cpanel/composer/bin/composer install --no-dev --optimize-autoloader)
    - cd $DEPLOYPATH && (/usr/local/bin/composer dump-autoload -o || /opt/cpanel/composer/bin/composer dump-autoload -o)
    - /bin/grep -q "inline API router" $DEPLOYPATH/backend/api/index.php || (echo "DEPLOY FAILED - backend/api/index.php is stale. Re-deploy from latest main." >&2; exit 1)
    - test -f $DEPLOYPATH/backend/bootstrap-aes.php || (echo "DEPLOY FAILED - backend/bootstrap-aes.php missing." >&2; exit 1)
    - test -f $DEPLOYPATH/backend/services/AesLoginService.php || (echo "DEPLOY FAILED - AesLoginService.php missing." >&2; exit 1)
    - test -f $DEPLOYPATH/.env || /bin/cp $DEPLOYPATH/.env.production.example $DEPLOYPATH/.env
