<!doctype html><html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Success Stories · AJCE Placements</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="css/style.css?v=20260711i" rel="stylesheet"/></head>
<body data-page="alumni-success-stories.html"><div class="app">
<aside class="sidebar" id="sidebar"></aside><div class="main"><header class="topbar" id="topbar"></header><main class="page">

<div class="page-header">
  <div>
    <h1 class="page-title">Success Stories</h1>
    <p class="page-sub">Share your placement journey. Published stories appear on the public placement portal.</p>
  </div>
  <div class="d-flex gap-2">
    <button type="button" class="btn btn-primary" onclick="openStoryForm()"><i class="bi bi-plus-lg me-1"></i>Add story</button>
  </div>
</div>

<div class="alert alert-light border card-surface mb-3 d-flex align-items-start gap-2">
  <i class="bi bi-globe2 text-primary mt-1"></i>
  <div class="small">Stories you submit are shown in the <a href="public-stats.html#stories" target="_blank" rel="noopener">Success stories</a> section on the landing page.</div>
</div>

<div class="card-surface">
  <div class="p-3 p-md-4 border-bottom d-flex justify-content-between align-items-center" style="border-color:var(--border)!important">
    <div>
      <h6 class="fw-bold mb-0">Your stories</h6>
      <small class="text-muted-2">Edit or remove stories you have shared.</small>
    </div>
    <span class="badge-soft muted" id="storyCount">0</span>
  </div>
  <div class="table-wrap">
    <table class="table-modern">
      <thead><tr><th>Title</th><th>Package</th><th>Published</th><th></th></tr></thead>
      <tbody id="storyRows"></tbody>
    </table>
  </div>
</div>

<div class="modal fade" id="storyModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content card-surface border-0">
      <div class="modal-header border-0 pb-0">
        <h5 class="modal-title fw-bold" id="storyModalTitle">Add success story</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <form id="storyForm" class="modal-body pt-2">
        <div class="row g-3">
          <div class="col-md-6"><label class="form-label small fw-semibold">Your name</label><input class="form-control" id="storyName" required placeholder="Full name"/></div>
          <div class="col-md-6"><label class="form-label small fw-semibold">Package</label><input class="form-control" id="storyPackage" placeholder="e.g. 12 LPA or ₹12 LPA"/></div>
          <div class="col-md-6"><label class="form-label small fw-semibold">Company</label><input class="form-control" id="storyCompany" required placeholder="e.g. Google"/></div>
          <div class="col-md-6"><label class="form-label small fw-semibold">Role</label><input class="form-control" id="storyRole" required placeholder="e.g. Software Engineer"/></div>
          <div class="col-12"><label class="form-label small fw-semibold">Your story</label><textarea class="form-control" id="storyQuote" rows="4" required placeholder="How did placement training, drives, or mentors help you succeed?"></textarea></div>
        </div>
        <div class="d-flex justify-content-end gap-2 mt-4">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn btn-primary" id="storySubmitBtn">Publish story</button>
        </div>
      </form>
    </div>
  </div>
</div>

</main></div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js?v=20260711b"></script>
<script src="js/app.js?v=20260711i"></script>
<script>
let editingStoryId = null;
let storyModal;
let alumniProfile = {};

function openStoryForm(id) {
  editingStoryId = id || null;
  const user = Auth.user() || {};
  document.getElementById('storyModalTitle').textContent = editingStoryId ? 'Edit success story' : 'Add success story';
  document.getElementById('storySubmitBtn').textContent = editingStoryId ? 'Save changes' : 'Publish story';
  if (editingStoryId) {
    const s = AlumniSuccessStories.mine().find(x => x.id === editingStoryId);
    if (!s) return;
    document.getElementById('storyName').value = s.name || '';
    document.getElementById('storyCompany').value = s.company || '';
    document.getElementById('storyRole').value = s.role || '';
    document.getElementById('storyPackage').value = s.package || '';
    document.getElementById('storyQuote').value = s.quote || '';
  } else {
    document.getElementById('storyForm').reset();
    document.getElementById('storyName').value = user.name || '';
    const profileCompany = alumniProfile.company || user.company || '';
    const profileRole = alumniProfile.title || alumniProfile.role || user.title || '';
    if (profileCompany) document.getElementById('storyCompany').value = profileCompany;
    if (profileRole) document.getElementById('storyRole').value = profileRole;
  }
  storyModal.show();
}

function storyTitle(s) {
  const company = s.company || '';
  const role = s.role || '';
  return company && role ? `${company} · ${role}` : (company || role || 'Success story');
}

async function renderStories() {
  await AlumniSuccessStories.fetch();
  const rows = AlumniSuccessStories.mine();
  document.getElementById('storyCount').textContent = rows.length;
  document.getElementById('storyRows').innerHTML = rows.length ? rows.map(s => `
    <tr>
      <td><strong>${storyTitle(s)}</strong><div class="small text-muted-2 text-truncate" style="max-width:420px">${s.quote || ''}</div></td>
      <td>${s.package || '—'}</td>
      <td>${s.createdAt ? formatDate(s.createdAt) : '—'}</td>
      <td><div class="d-flex gap-1">
        <button class="btn btn-sm btn-outline-primary" onclick="openStoryForm('${s.id}')" title="Edit"><i class="bi bi-pencil"></i></button>
        <button class="btn btn-sm btn-outline-danger" onclick="removeStory('${s.id}')" title="Remove"><i class="bi bi-trash"></i></button>
      </div></td>
    </tr>`).join('')
    : '<tr><td colspan="4" class="text-muted-2 p-4">No stories yet. <button type="button" class="btn btn-link btn-sm p-0 align-baseline" onclick="openStoryForm()">Share your first success story</button></td></tr>';
}

async function removeStory(id) {
  if (!(await confirmAction({
    title: 'Remove story',
    message: 'Remove this story from the public portal?',
    confirmText: 'Remove',
    variant: 'danger',
  }))) return;
  const ok = await AlumniSuccessStories.remove(id);
  toast(ok ? 'Story removed.' : 'Could not remove story.', ok ? 'success' : 'error');
  renderStories();
}

document.getElementById('storyForm').addEventListener('submit', async e => {
  e.preventDefault();
  const payload = {
    name: document.getElementById('storyName').value.trim(),
    company: document.getElementById('storyCompany').value.trim(),
    role: document.getElementById('storyRole').value.trim(),
    package: document.getElementById('storyPackage').value.trim(),
    quote: document.getElementById('storyQuote').value.trim(),
  };
  if (!(await confirmAction({
    title: editingStoryId ? 'Update story' : 'Publish story',
    message: `${editingStoryId ? 'Update' : 'Publish'} success story for ${payload.name}?`,
    confirmText: editingStoryId ? 'Update' : 'Publish',
    variant: 'primary',
  }))) return;
  const ok = editingStoryId
    ? await AlumniSuccessStories.update(editingStoryId, payload)
    : await AlumniSuccessStories.add(payload);
  if (ok) {
    storyModal.hide();
    toast(editingStoryId ? 'Story updated.' : 'Story published on the landing page.', 'success');
    renderStories();
  }
});

onAppReady(async () => {
  storyModal = new bootstrap.Modal(document.getElementById('storyModal'));
  const res = await api('/alumni/profile');
  if (res.success && res.data) alumniProfile = res.data;
  renderStories();
});
</script>
</body></html>
